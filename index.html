<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Bookmark Sorter</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600;700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root {
  --bg:#eef2f7; --surface:#fff; --surface2:#f4f7fb;
  --border:#dde3ee; --text:#1a1f2e; --text-muted:#7a849a;
  --accent:#2563eb; --accent-light:#eff4ff;
  --gold:#f59e0b; --gold-light:#fffbeb;
  --red:#ef4444; --green:#10b981;
  --shadow:0 2px 12px rgba(30,50,100,.08);
  --shadow-lg:0 8px 32px rgba(30,50,100,.14);
  --radius:16px; --radius-sm:10px;
}
body.dark {
  --bg:#0f1117; --surface:#1a1d27; --surface2:#21253a;
  --border:#2a2f45; --text:#e4e6f0; --text-muted:#7a82a0;
  --accent:#7c9dff; --accent-light:rgba(124,157,255,.12);
  --gold:#f59e0b; --gold-light:rgba(245,158,11,.12);
  --red:#f04f4f; --green:#34d399;
  --shadow:0 2px 12px rgba(0,0,0,.3);
  --shadow-lg:0 8px 32px rgba(0,0,0,.5);
}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;transition:background .2s,color .2s}

/* ── Header ── */
.header{background:var(--surface);border-bottom:1px solid var(--border);padding:12px 24px;display:flex;align-items:center;gap:12px;position:sticky;top:0;z-index:100;box-shadow:var(--shadow);flex-wrap:wrap}
.logo{display:flex;align-items:center;gap:10px;flex-shrink:0}
.logo-icon{width:34px;height:34px;background:linear-gradient(135deg,#2563eb,#1d4ed8);border-radius:10px;display:flex;align-items:center;justify-content:center;color:#fff;font-size:16px}
.logo-text{font-size:19px;font-weight:700}
.logo-text span{color:var(--accent)}
.header-controls{display:flex;align-items:center;gap:8px;flex:1;flex-wrap:wrap}

/* Dropdown */
.dropdown-wrapper{position:relative}
.dropdown-btn{display:flex;align-items:center;gap:7px;background:var(--surface2);border:1px solid var(--border);border-radius:var(--radius-sm);padding:7px 13px;font-family:inherit;font-size:13px;font-weight:500;color:var(--text);cursor:pointer;transition:all .2s;min-width:140px}
.dropdown-btn:hover{border-color:var(--accent);background:var(--accent-light)}
.dropdown-arrow{margin-left:auto;transition:transform .2s;font-size:10px;color:var(--text-muted)}
.dropdown-arrow.open{transform:rotate(180deg)}
.dropdown-menu{position:absolute;top:calc(100% + 5px);left:0;background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-sm);box-shadow:var(--shadow-lg);min-width:190px;z-index:200;overflow:hidden;animation:fadeDown .15s ease}
@keyframes fadeDown{from{opacity:0;transform:translateY(-5px)}to{opacity:1;transform:none}}
.dropdown-item{padding:9px 14px;font-size:13px;cursor:pointer;display:flex;align-items:center;justify-content:space-between;transition:background .1s}
.dropdown-item:hover{background:var(--surface2)}
.dropdown-item.active{background:var(--accent-light);color:var(--accent);font-weight:600}
.tag-count{background:var(--border);border-radius:20px;padding:1px 7px;font-size:11px;font-weight:600;color:var(--text-muted)}
.active .tag-count{background:var(--accent);color:#fff}

/* Sort select */
.sort-select{background:var(--surface2);border:1px solid var(--border);border-radius:var(--radius-sm);padding:7px 11px;font-family:inherit;font-size:13px;color:var(--text);cursor:pointer;outline:none;transition:all .2s}
.sort-select:hover,.sort-select:focus{border-color:var(--accent)}
body.dark .sort-select option{background:#21253a}

/* Search */
.search-box{flex:1;max-width:280px;position:relative}
.search-box input{width:100%;background:var(--surface2);border:1px solid var(--border);border-radius:var(--radius-sm);padding:7px 12px 7px 34px;font-family:inherit;font-size:13px;color:var(--text);transition:all .2s;outline:none}
.search-box input::placeholder{color:var(--text-muted)}
.search-box input:focus{border-color:var(--accent);background:var(--surface)}
.search-icon{position:absolute;left:10px;top:50%;transform:translateY(-50%);color:var(--text-muted);font-size:14px;pointer-events:none}

/* Header buttons */
.hdr-btn{display:flex;align-items:center;gap:5px;padding:7px 13px;border-radius:var(--radius-sm);font-family:inherit;font-size:13px;font-weight:400;cursor:pointer;border:1px solid var(--border);background:var(--surface2);color:var(--text);transition:all .2s;white-space:nowrap}
.hdr-btn:hover{border-color:var(--accent);color:var(--accent);background:var(--accent-light)}
.hdr-btn.active{background:var(--accent);color:#fff;border-color:var(--accent)}
.hdr-btn-icon{padding:7px 10px;font-size:15px}

/* ── Tabs ── */
.tabs{display:flex;gap:3px;padding:10px 24px 0;border-bottom:1px solid var(--border);background:var(--surface)}
.tab{padding:8px 16px;font-size:13px;font-weight:500;color:var(--text-muted);cursor:pointer;border-radius:9px 9px 0 0;border:1px solid transparent;border-bottom:none;transition:all .15s;display:flex;align-items:center;gap:5px}
.tab:hover{color:var(--text);background:var(--surface2)}
.tab.active{color:var(--accent);background:var(--bg);border-color:var(--border);font-weight:600;position:relative}
.tab.active::after{content:'';position:absolute;bottom:-1px;left:0;right:0;height:1px;background:var(--bg)}
.tab-badge{background:var(--border);color:var(--text-muted);border-radius:20px;padding:1px 6px;font-size:11px;font-weight:600}
.tab.active .tab-badge{background:var(--accent);color:#fff}
.badge-gold{background:var(--gold)!important;color:#fff!important}
.badge-red{background:var(--red)!important;color:#fff!important}

/* ── Bulk bar ── */
.bulk-bar{background:#1e293b;padding:10px 24px;display:flex;align-items:center;gap:10px;flex-wrap:wrap;position:sticky;top:58px;z-index:90;animation:slideDown .2s ease}
body.dark .bulk-bar{background:#21253a;border-bottom:1px solid var(--border)}
@keyframes slideDown{from{opacity:0;transform:translateY(-6px)}to{opacity:1;transform:none}}
.bulk-info{display:flex;align-items:center;gap:8px;min-width:130px}
.bulk-info label{display:flex;align-items:center;gap:7px;cursor:pointer;font-weight:400;font-size:13px;color:#fff}
#selectedCountLabel{color:#fff;font-size:13px;font-weight:400}
.bulk-actions{display:flex;align-items:center;gap:7px;flex:1;flex-wrap:wrap}
.bulk-btn{padding:5px 12px;border-radius:7px;font-family:inherit;font-size:12px;font-weight:400;cursor:pointer;border:1px solid rgba(255,255,255,.2);background:rgba(255,255,255,.1);color:#fff;transition:all .15s;white-space:nowrap}
.bulk-btn:hover{background:rgba(255,255,255,.2);border-color:rgba(255,255,255,.4)}
.bulk-btn.danger:hover{background:var(--red);border-color:var(--red)}
.bulk-cancel{margin-left:auto;padding:5px 12px;border-radius:7px;font-family:inherit;font-size:12px;font-weight:400;cursor:pointer;border:1px solid rgba(255,255,255,.25);background:transparent;color:rgba(255,255,255,.7);transition:all .15s}
.bulk-cancel:hover{background:rgba(255,255,255,.1);color:#fff}

/* ── Main ── */
.main{padding:22px 24px 80px;max-width:1400px;margin:0 auto}
.stats-bar{display:flex;align-items:center;gap:10px;margin-bottom:18px;font-size:13px;color:var(--text-muted)}
.stats-bar strong{color:var(--text)}
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:18px}

/* ── Card ── */
.card{background:var(--surface);border-radius:var(--radius);border:1px solid var(--border);padding:18px;cursor:pointer;transition:all .2s;position:relative;box-shadow:var(--shadow);animation:cardIn .3s ease both}
@keyframes cardIn{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:none}}
.card:hover{box-shadow:var(--shadow-lg);transform:translateY(-2px);border-color:#c7d4f0}
body.dark .card:hover{border-color:#3a4060}
.card.favorited{border-color:var(--gold);box-shadow:0 2px 12px rgba(245,158,11,.15)}
.card.selected{border-color:var(--accent);background:var(--accent-light);box-shadow:0 0 0 2px rgba(37,99,235,.2)}
.card-header{display:flex;align-items:center;gap:12px;margin-bottom:12px}
.favicon{width:40px;height:40px;border-radius:10px;background:var(--surface2);border:1px solid var(--border);display:flex;align-items:center;justify-content:center;font-size:18px;font-weight:700;flex-shrink:0;overflow:hidden}
.favicon img{width:24px;height:24px;object-fit:contain}
.card-meta{flex:1;min-width:0}
.card-title{font-size:15px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.card-url{font-size:12px;color:var(--text-muted);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;font-family:'DM Mono',monospace}
.card-tag{display:inline-flex;align-items:center;padding:3px 9px;border-radius:20px;font-size:11px;font-weight:600;letter-spacing:.04em;text-transform:uppercase}
.card-footer{display:flex;align-items:center;justify-content:space-between;margin-top:12px}
.visit-count{font-size:12px;color:var(--text-muted);display:flex;align-items:center;gap:4px}
.visit-dot{width:6px;height:6px;border-radius:50%;background:var(--green);display:inline-block;margin-right:2px}
.card-arrow{color:var(--text-muted);font-size:15px;transition:transform .2s,color .2s}
.card:hover .card-arrow{color:var(--accent);transform:translateX(3px)}
.added-date{font-size:11px;color:var(--text-muted);margin-top:6px}
.card-actions{position:absolute;top:10px;right:10px;display:none;gap:5px}
.card:hover .card-actions{display:flex}
.action-btn{width:28px;height:28px;border-radius:8px;border:1px solid var(--border);background:var(--surface);color:var(--text-muted);display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:13px;transition:all .15s}
.action-btn:hover{background:var(--accent);color:#fff;border-color:var(--accent)}
.action-btn.delete:hover{background:var(--red);color:#fff;border-color:var(--red)}
.action-btn.fav.on{background:var(--gold-light);border-color:var(--gold);color:var(--gold)}
.star-badge{position:absolute;top:10px;left:10px;font-size:13px;pointer-events:none}
.inactive-badge{position:absolute;top:-6px;right:44px;background:var(--red);color:#fff;font-size:10px;font-weight:700;padding:2px 7px;border-radius:20px}
.card-checkbox{position:absolute;top:12px;left:12px;z-index:10;width:18px;height:18px;cursor:pointer;accent-color:var(--accent);display:none}
.bulk-mode .card-checkbox{display:block}
.bulk-mode .card{cursor:default;padding-left:40px}
.bulk-mode .card-actions{display:none!important}
.bulk-mode .star-badge{left:36px}

/* ── FAB ── */
.fab{position:fixed;bottom:26px;right:26px;width:52px;height:52px;border-radius:17px;background:linear-gradient(135deg,#2563eb,#1d4ed8);color:#fff;border:none;font-size:26px;cursor:pointer;box-shadow:0 4px 20px rgba(37,99,235,.4);display:flex;align-items:center;justify-content:center;transition:all .2s;z-index:300}
.fab:hover{transform:scale(1.08) rotate(90deg);box-shadow:0 8px 28px rgba(37,99,235,.5)}

/* ── Modal ── */
.modal-overlay{position:fixed;inset:0;background:rgba(10,20,50,.4);backdrop-filter:blur(4px);z-index:500;display:flex;align-items:center;justify-content:center;animation:fadeIn .2s ease}
body.dark .modal-overlay{background:rgba(0,0,0,.6)}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
.modal{background:var(--surface);border-radius:20px;padding:26px;width:480px;max-width:95vw;max-height:90vh;overflow-y:auto;box-shadow:0 24px 80px rgba(10,20,50,.25);animation:slideUp .25s ease}
.modal::-webkit-scrollbar{width:5px}
.modal::-webkit-scrollbar-thumb{background:var(--border);border-radius:3px}
@keyframes slideUp{from{opacity:0;transform:translateY(18px)}to{opacity:1;transform:none}}
.modal-title{font-size:19px;font-weight:700;margin-bottom:20px}
.form-group{margin-bottom:15px}
.form-label{display:block;font-size:12px;font-weight:600;color:var(--text-muted);margin-bottom:5px;letter-spacing:.05em;text-transform:uppercase}
.form-input{width:100%;background:var(--surface2);border:1px solid var(--border);border-radius:var(--radius-sm);padding:9px 13px;font-family:inherit;font-size:14px;color:var(--text);outline:none;transition:all .2s}
.form-input:focus{border-color:var(--accent);background:var(--surface);box-shadow:0 0 0 3px rgba(37,99,235,.1)}
.modal-actions{display:flex;gap:9px;margin-top:20px;justify-content:flex-end}
.btn{padding:9px 18px;border-radius:var(--radius-sm);font-family:inherit;font-size:14px;font-weight:600;cursor:pointer;transition:all .15s;border:none}
.btn-ghost{background:var(--surface2);color:var(--text-muted);border:1px solid var(--border)}
.btn-ghost:hover{background:var(--border)}
.btn-primary{background:linear-gradient(135deg,#2563eb,#1d4ed8);color:#fff;box-shadow:0 2px 10px rgba(37,99,235,.3)}
.btn-primary:hover{transform:translateY(-1px);box-shadow:0 4px 16px rgba(37,99,235,.4)}

/* Icon picker */
.icon-picker{display:flex;gap:7px;flex-wrap:wrap;margin-top:7px}
.icon-opt{width:34px;height:34px;border-radius:8px;background:var(--surface2);border:1px solid var(--border);display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:17px;transition:all .15s}
.icon-opt:hover,.icon-opt.selected{border-color:var(--accent);background:var(--accent-light)}

/* Tag chips */
.tag-chips{display:flex;gap:6px;flex-wrap:wrap;margin-top:4px}
.tag-chip{padding:4px 10px;border-radius:20px;font-size:12px;background:var(--surface2);border:1px solid var(--border);cursor:pointer;font-weight:500;transition:all .15s;display:flex;align-items:center;gap:5px}
.tag-chip:hover:not(.selected){border-color:var(--accent)}
.tag-chip.selected{background:var(--accent);color:#fff;border-color:var(--accent)}
.tag-dot{width:7px;height:7px;border-radius:50%;flex-shrink:0}
.new-tag-input{display:flex;gap:7px;margin-top:9px}

/* Photo upload */
.photo-drop-area{border:2px dashed var(--border);border-radius:var(--radius-sm);padding:14px;text-align:center;cursor:pointer;transition:all .2s;flex:1}
.photo-drop-area:hover,.photo-drop-area.dragover{border-color:var(--accent);background:var(--accent-light)}

/* Misc */
.url-loading{font-size:12px;color:var(--accent);margin-top:4px;display:flex;align-items:center;gap:6px}
.spinner{width:12px;height:12px;border:2px solid var(--border);border-top-color:var(--accent);border-radius:50%;animation:spin .6s linear infinite;display:inline-block}
@keyframes spin{to{transform:rotate(360deg)}}
.dup-warning{background:#fff7ed;border:1px solid #fed7aa;border-radius:8px;padding:9px 13px;font-size:13px;color:#c2410c;display:flex;align-items:center;gap:7px;margin-top:5px}
body.dark .dup-warning{background:rgba(245,158,11,.1);border-color:rgba(245,158,11,.3);color:#fbbf24}
.empty-state{text-align:center;padding:80px 20px;color:var(--text-muted);grid-column:1/-1}
.empty-icon{font-size:46px;margin-bottom:12px}
.empty-title{font-size:17px;font-weight:600;color:var(--text);margin-bottom:6px}
.danger-chip{background:#fee2e2!important;border-color:var(--red)!important;color:var(--red)!important}
body.dark .danger-chip{background:rgba(240,79,79,.15)!important;color:var(--red)!important}

/* ── Tag Manager ── */
.tag-manager-row{display:flex;align-items:center;gap:9px;padding:8px 11px;border-radius:9px;border:1px solid var(--border);background:var(--surface2);transition:all .15s;user-select:none}
.tag-manager-row:hover{border-color:var(--accent)}
.tag-manager-row.drag-over{border-color:var(--accent);background:var(--accent-light);transform:scale(1.01)}
.tag-manager-row.sono-tag{opacity:.7}
.tag-drag-handle{color:var(--text-muted);cursor:grab;font-size:16px;padding:0 2px;flex-shrink:0;line-height:1}
.tag-drag-handle:active{cursor:grabbing}
.tag-manager-dot{width:10px;height:10px;border-radius:50%;flex-shrink:0}
.tag-manager-name{flex:1;background:transparent;border:none;outline:none;font-family:inherit;font-size:14px;font-weight:500;color:var(--text);padding:2px 5px;border-radius:6px;transition:background .15s;min-width:0}
.tag-manager-name:focus{background:var(--surface);box-shadow:0 0 0 2px rgba(37,99,235,.15)}
.tag-manager-count{font-size:12px;color:var(--text-muted);background:var(--border);border-radius:20px;padding:2px 8px;white-space:nowrap;flex-shrink:0}
.tag-manager-delete{width:26px;height:26px;border-radius:7px;border:1px solid transparent;background:transparent;color:var(--text-muted);cursor:pointer;font-size:12px;display:flex;align-items:center;justify-content:center;transition:all .15s;flex-shrink:0}
.tag-manager-delete:hover{background:#fee2e2;border-color:var(--red);color:var(--red)}
body.dark .tag-manager-delete:hover{background:rgba(240,79,79,.15)}
</style>
</head>
<body>
<div id="app">

<!-- Header -->
<div class="header">
  <div class="logo">
    <div class="logo-icon">🔖</div>
    <div class="logo-text">Bookmark <span>Sorter</span></div>
  </div>
  <div class="header-controls">
    <!-- Tag filter -->
    <div class="dropdown-wrapper" id="dropdownWrapper">
      <button class="dropdown-btn" id="dropdownBtn" onclick="toggleDropdown()">
        <span>🏷️</span><span id="selectedTagLabel">すべてのタグ</span>
        <span class="dropdown-arrow" id="dropdownArrow">▼</span>
      </button>
      <div class="dropdown-menu" id="dropdownMenu" style="display:none"></div>
    </div>
    <!-- Sort -->
    <select class="sort-select" id="sortSelect" onchange="renderCards()">
      <option value="visits">よく使う順</option>
      <option value="added">追加日（新しい）</option>
      <option value="added_asc">追加日（古い）</option>
      <option value="recent">最近使った順</option>
      <option value="alpha">タイトル A→Z</option>
      <option value="alpha_desc">タイトル Z→A</option>
      <option value="random">ランダム</option>
    </select>
    <!-- Search -->
    <div class="search-box">
      <span class="search-icon">🔍</span>
      <input type="text" placeholder="タイトル・URLで検索..." id="searchInput" oninput="renderCards()">
    </div>
    <!-- Tag manager -->
    <button class="hdr-btn" onclick="openTagManager()">🏷️ タグ管理</button>
    <!-- Bulk edit -->
    <button class="hdr-btn" id="bulkToggleBtn" onclick="toggleBulkMode()">☑️ 一括編集</button>
    <!-- Dark mode -->
    <button class="hdr-btn hdr-btn-icon" id="darkModeBtn" onclick="toggleDarkMode()" title="ダークモード">🌙</button>
  </div>
</div>

<!-- Tabs -->
<div class="tabs">
  <div class="tab active" id="tab-all"      onclick="switchTab('all')">📚 すべて <span class="tab-badge" id="badge-all">0</span></div>
  <div class="tab"        id="tab-favorite" onclick="switchTab('favorite')">⭐ お気に入り <span class="tab-badge badge-gold" id="badge-fav">0</span></div>
  <div class="tab"        id="tab-inactive" onclick="switchTab('inactive')">💤 未使用(30日+) <span class="tab-badge badge-red" id="badge-inactive">0</span></div>
</div>

<!-- Bulk bar -->
<div class="bulk-bar" id="bulkBar" style="display:none">
  <div class="bulk-info">
    <label>
      <input type="checkbox" id="selectAllChk" onchange="toggleSelectAll()" style="width:15px;height:15px;cursor:pointer;accent-color:var(--accent)">
      <span id="selectedCountLabel">0件選択中</span>
    </label>
  </div>
  <div class="bulk-actions">
    <button class="bulk-btn" onclick="bulkFavorite(true)">⭐ お気に入り追加</button>
    <button class="bulk-btn" onclick="bulkFavorite(false)">☆ お気に入り解除</button>
    <button class="bulk-btn" onclick="openBulkTagModal()">🏷️ タグ変更</button>
    <button class="bulk-btn danger" onclick="bulkDelete()">🗑️ 削除</button>
  </div>
  <button class="bulk-cancel" onclick="toggleBulkMode()">✕ 終了</button>
</div>

<!-- Main -->
<div class="main">
  <div class="stats-bar"><strong id="visibleCount">0</strong> 件表示中</div>
  <div class="grid" id="grid"></div>
</div>

<button class="fab" onclick="openModal()">＋</button>
</div>

<!-- Add/Edit Modal -->
<div class="modal-overlay" id="modal" style="display:none" onclick="if(event.target===this)closeModal()">
  <div class="modal" onclick="event.stopPropagation()">
    <div class="modal-title" id="modalTitle">🔖 ブックマークを追加</div>
    <div class="form-group">
      <label class="form-label">URL</label>
      <input class="form-input" type="url" id="urlInput" placeholder="https://example.com" oninput="onUrlInput()">
      <div id="urlStatus"></div>
      <div id="dupWarning"></div>
    </div>
    <div class="form-group">
      <label class="form-label">アイコン</label>
      <div style="display:flex;align-items:center;gap:11px;margin-bottom:10px">
        <div style="position:relative;cursor:pointer" onclick="document.getElementById('photoUpload').click()">
          <div class="favicon" id="previewIcon" style="width:50px;height:50px;font-size:23px;border-radius:12px;border:2px dashed var(--border)">🌐</div>
          <div style="position:absolute;bottom:-4px;right:-4px;width:19px;height:19px;background:var(--accent);border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:10px;color:#fff;border:2px solid var(--surface)">📷</div>
        </div>
        <div class="photo-drop-area" id="dropArea" onclick="document.getElementById('photoUpload').click()">
          <div style="font-size:19px;margin-bottom:3px">🖼️</div>
          <div style="font-size:13px;font-weight:500">写真ライブラリから選択</div>
          <div style="font-size:11px;color:var(--text-muted)">クリックまたはドラッグ&ドロップ</div>
        </div>
        <input type="file" id="photoUpload" accept="image/*" style="display:none" onchange="onPhotoUpload(event)">
      </div>
      <div id="photoStatus"></div>
      <div style="font-size:12px;color:var(--text-muted);margin-bottom:5px">または絵文字から選択：</div>
      <div class="icon-picker" id="iconPicker"></div>
    </div>
    <div class="form-group">
      <label class="form-label">タイトル</label>
      <input class="form-input" type="text" id="titleInput" placeholder="サイトのタイトル">
    </div>
    <div class="form-group">
      <label class="form-label">タグ</label>
      <div class="tag-chips" id="tagChips"></div>
      <div class="new-tag-input">
        <input class="form-input" type="text" id="newTagInput" placeholder="新しいタグを入力..." style="flex:1">
        <button class="btn btn-ghost" onclick="addCustomTag()">追加</button>
      </div>
    </div>
    <div class="modal-actions">
      <button class="btn btn-ghost" onclick="closeModal()">キャンセル</button>
      <button class="btn btn-primary" onclick="saveBookmark()">保存する</button>
    </div>
  </div>
</div>

<!-- Tag Manager Modal -->
<div class="modal-overlay" id="tagManagerModal" style="display:none" onclick="if(event.target===this)closeTagManager()">
  <div class="modal" style="max-width:500px" onclick="event.stopPropagation()">
    <div class="modal-title">🏷️ タグ管理</div>
    <p style="font-size:13px;color:var(--text-muted);margin-bottom:15px">⠿ をドラッグして並び替え。タグ名をクリックして編集できます。</p>
    <div id="tagManagerList" style="display:flex;flex-direction:column;gap:5px;margin-bottom:16px;max-height:350px;overflow-y:auto;padding-right:3px"></div>
    <div class="form-group">
      <label class="form-label">新しいタグを追加</label>
      <div style="display:flex;gap:8px">
        <input class="form-input" type="text" id="newGlobalTagInput" placeholder="タグ名を入力..." style="flex:1" onkeydown="if(event.key==='Enter')addGlobalTag()">
        <button class="btn btn-primary" onclick="addGlobalTag()">追加</button>
      </div>
    </div>
    <div class="modal-actions">
      <button class="btn btn-ghost" onclick="closeTagManager()">閉じる</button>
      <button class="btn btn-primary" onclick="applyAndCloseTagManager()">✓ 変更を保存</button>
    </div>
  </div>
</div>

<!-- Bulk Tag Modal -->
<div class="modal-overlay" id="bulkTagModal" style="display:none" onclick="if(event.target===this)document.getElementById('bulkTagModal').style.display='none'">
  <div class="modal" style="max-width:420px" onclick="event.stopPropagation()">
    <div class="modal-title" id="bulkTagTitle">🏷️ タグを一括変更</div>
    <p style="font-size:13px;color:var(--text-muted);margin-bottom:14px">選択した操作を全選択済みブックマークに適用します</p>
    <div class="form-group">
      <label class="form-label">追加するタグ</label>
      <div class="tag-chips" id="bulkAddTags"></div>
    </div>
    <div class="form-group" style="margin-top:14px">
      <label class="form-label">削除するタグ</label>
      <div class="tag-chips" id="bulkRemoveTags"></div>
    </div>
    <div class="modal-actions">
      <button class="btn btn-ghost" onclick="document.getElementById('bulkTagModal').style.display='none'">キャンセル</button>
      <button class="btn btn-primary" onclick="applyBulkTags()">適用する</button>
    </div>
  </div>
</div>

<script>
// ── Constants ──
const ICONS = ['🌐','📰','🎯','💡','🛠️','🎨','📊','🚀','🎵','📚','🔬','🏆','💬','🛒','🎮','📷','✉️','🗺️','🔐','🤖'];
const PRESET_TAGS = ['AI','DEVELOPMENT','DESIGN','PRODUCTIVITY','NEWS','SOCIAL','VIDEO','その他'];
const INACTIVE_DAYS = 30;

let TAG_COLORS = {
  AI:'#2563eb', DEVELOPMENT:'#059669', DESIGN:'#db2777',
  PRODUCTIVITY:'#d97706', NEWS:'#16a34a', SOCIAL:'#7c3aed',
  VIDEO:'#e63946', 'その他':'#6b7280'
};
const COLOR_PALETTE = [
  '#e63946','#f4845f','#f9c74f','#90be6d','#43aa8b','#4cc9f0',
  '#7209b7','#f72585','#4361ee','#06d6a0','#ff6b35','#a8dadc',
  '#ff9f1c','#2ec4b6','#cbf3f0','#e71d36'
];

function assignUniqueColor(tag) {
  const used = Object.values(TAG_COLORS);
  const avail = COLOR_PALETTE.filter(c => !used.includes(c));
  if (avail.length) { TAG_COLORS[tag] = avail[0]; return avail[0]; }
  const hue = (Object.keys(TAG_COLORS).length * 47 + 13) % 360;
  const c = 'hsl(' + hue + ',65%,48%)';
  TAG_COLORS[tag] = c; return c;
}

// ── State ──
let bookmarks        = JSON.parse(localStorage.getItem('bm_v2') || '[]');
let tagOrder         = [];
let editingId        = null;
let selectedTag      = null;
let selectedIcon     = '🌐';
let selectedTags     = [];
let customImageData  = null;
let currentFaviconUrl = null;
let urlTimeout       = null;
let currentTab       = 'all';
let bulkMode         = false;
let selectedIds      = new Set();
let dragSrcIdx       = null;
let tmCurrentOrder   = [];

// ── Helpers ──
function save()       { localStorage.setItem('bm_v2', JSON.stringify(bookmarks)); }
function generateId() { return Date.now().toString(36) + Math.random().toString(36).slice(2); }
function getInitials(t){ return (t||'?').substring(0,2).toUpperCase(); }
function getDomain(u) { try{return new URL(u).hostname.replace('www.','')}catch{return u} }
function getFaviconUrl(u){ try{return 'https://www.google.com/s2/favicons?domain='+new URL(u).hostname+'&sz=32'}catch{return null} }
function getTagColor(tag){ return TAG_COLORS[tag] || '#6b7280'; }
function daysSince(ds){ if(!ds)return Infinity; return Math.floor((Date.now()-new Date(ds))/86400000); }
function fmtDate(ds){
  if(!ds)return '';
  const d=new Date(ds);
  return d.getFullYear()+'/'+String(d.getMonth()+1).padStart(2,'0')+'/'+String(d.getDate()).padStart(2,'0');
}
function esc(s){ return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }

// ── Tag order helpers ──
function saveTagOrder(){
  tagOrder = [...tagOrder.filter(t=>t!=='その他'),'その他'];
  localStorage.setItem('bm_tag_order', JSON.stringify(tagOrder));
  localStorage.setItem('bm_tag_colors', JSON.stringify(TAG_COLORS));
}
function loadTagOrder(){
  try{
    const r=localStorage.getItem('bm_tag_order');
    if(r) tagOrder=JSON.parse(r);
    const rc=localStorage.getItem('bm_tag_colors');
    if(rc) Object.assign(TAG_COLORS, JSON.parse(rc));
  }catch(e){}
}
function normalizeTagOrder(){
  const allUsed=[...new Set([...PRESET_TAGS,...bookmarks.flatMap(b=>b.tags)])];
  allUsed.forEach(t=>{
    if(t==='その他')return;
    if(!tagOrder.includes(t)){
      const idx=tagOrder.indexOf('その他');
      if(idx!==-1) tagOrder.splice(idx,0,t);
      else tagOrder.push(t);
      if(!TAG_COLORS[t]) assignUniqueColor(t);
    }
  });
  tagOrder=[...tagOrder.filter(t=>t!=='その他'),'その他'];
}
function getOrderedTags(){
  const allUsed=[...new Set([...PRESET_TAGS,...bookmarks.flatMap(b=>b.tags)])];
  return [
    ...tagOrder.filter(t=>t!=='その他'&&allUsed.includes(t)),
    ...allUsed.filter(t=>t!=='その他'&&!tagOrder.includes(t)),
    ...(allUsed.includes('その他')||PRESET_TAGS.includes('その他')?['その他']:[])
  ];
}

// ── Dark mode ──
function toggleDarkMode(){
  const dark=document.body.classList.toggle('dark');
  localStorage.setItem('bm_dark', dark?'1':'0');
  document.getElementById('darkModeBtn').textContent=dark?'☀️':'🌙';
}

// ── Dropdown ──
function toggleDropdown(){
  const m=document.getElementById('dropdownMenu');
  const a=document.getElementById('dropdownArrow');
  const open=m.style.display!=='none';
  m.style.display=open?'none':'block';
  a.classList.toggle('open',!open);
}
document.addEventListener('click',e=>{
  if(!document.getElementById('dropdownWrapper').contains(e.target)){
    document.getElementById('dropdownMenu').style.display='none';
    document.getElementById('dropdownArrow').classList.remove('open');
  }
});
function renderDropdown(){
  const ordered=getOrderedTags();
  document.getElementById('dropdownMenu').innerHTML=
    '<div class="dropdown-item '+(selectedTag===null?'active':'')+'" onclick="filterByTag(null)">すべて <span class="tag-count">'+bookmarks.length+'</span></div>'+
    ordered.map(tag=>{
      const n=bookmarks.filter(b=>b.tags.includes(tag)).length;
      const dot='<span style="display:inline-block;width:8px;height:8px;border-radius:50%;background:'+getTagColor(tag)+';margin-right:6px;vertical-align:middle"></span>';
      return '<div class="dropdown-item '+(selectedTag===tag?'active':'')+'" onclick="filterByTag(\''+esc(tag)+'\')">'+dot+esc(tag)+' <span class="tag-count">'+n+'</span></div>';
    }).join('');
}
function filterByTag(tag){
  selectedTag=tag;
  document.getElementById('selectedTagLabel').textContent=tag||'すべてのタグ';
  document.getElementById('dropdownMenu').style.display='none';
  document.getElementById('dropdownArrow').classList.remove('open');
  renderDropdown(); renderCards();
}

// ── Tabs ──
function switchTab(tab){
  currentTab=tab;
  ['all','favorite','inactive'].forEach(t=>
    document.getElementById('tab-'+t).classList.toggle('active',t===tab)
  );
  renderCards();
}
function updateBadges(){
  document.getElementById('badge-all').textContent=bookmarks.length;
  document.getElementById('badge-fav').textContent=bookmarks.filter(b=>b.favorite).length;
  document.getElementById('badge-inactive').textContent=bookmarks.filter(b=>daysSince(b.lastVisited)>=INACTIVE_DAYS).length;
}

// ── Sort ──
function sortList(list){
  const s=document.getElementById('sortSelect').value;
  const a=[...list];
  if(s==='visits')     return a.sort((x,y)=>(y.visits||0)-(x.visits||0));
  if(s==='added')      return a.sort((x,y)=>new Date(y.addedAt)-new Date(x.addedAt));
  if(s==='added_asc')  return a.sort((x,y)=>new Date(x.addedAt)-new Date(y.addedAt));
  if(s==='recent')     return a.sort((x,y)=>new Date(y.lastVisited||0)-new Date(x.lastVisited||0));
  if(s==='alpha')      return a.sort((x,y)=>x.title.localeCompare(y.title,'ja'));
  if(s==='alpha_desc') return a.sort((x,y)=>y.title.localeCompare(x.title,'ja'));
  if(s==='random')     return a.sort(()=>Math.random()-.5);
  return a;
}

// ── Render cards ──
function renderCards(){
  updateBadges();
  const q=document.getElementById('searchInput').value.toLowerCase();
  let list=[...bookmarks];
  if(currentTab==='favorite') list=list.filter(b=>b.favorite);
  if(currentTab==='inactive') list=list.filter(b=>daysSince(b.lastVisited)>=INACTIVE_DAYS);
  if(selectedTag) list=list.filter(b=>b.tags.includes(selectedTag));
  if(q) list=list.filter(b=>b.title.toLowerCase().includes(q)||b.url.toLowerCase().includes(q));
  list=sortList(list);
  document.getElementById('visibleCount').textContent=list.length;

  const grid=document.getElementById('grid');
  if(bulkMode) grid.classList.add('bulk-mode');
  else grid.classList.remove('bulk-mode');

  if(!list.length){
    grid.innerHTML='<div class="empty-state"><div class="empty-icon">'+(currentTab==='favorite'?'⭐':currentTab==='inactive'?'💤':'🔖')+'</div><div class="empty-title">'+(currentTab==='favorite'?'お気に入りがありません':currentTab==='inactive'?INACTIVE_DAYS+'日以上未使用のブックマークはありません':'ブックマークがありません')+'</div></div>';
    return;
  }

  grid.innerHTML=list.map((b,i)=>{
    const tags=b.tags.map(t=>'<span class="card-tag" style="background:'+getTagColor(t)+'22;color:'+getTagColor(t)+'">'+esc(t)+'</span>').join('');
    const inactive=currentTab!=='inactive'&&daysSince(b.lastVisited)>=INACTIVE_DAYS;
    const iconHTML=b.customImageData
      ?'<div style="width:100%;height:100%;background:url('+b.customImageData+') center/cover;border-radius:9px"></div>'
      :b.faviconUrl
        ?'<img src="'+b.faviconUrl+'" onerror="this.parentElement.textContent=\''+esc(b.icon||getInitials(b.title))+'\'" alt="" style="width:24px;height:24px">'
        :'<span style="color:'+( b.color||'#2563eb')+'">'+esc(b.icon||getInitials(b.title))+'</span>';
    return '<div class="card'+(b.favorite?' favorited':'')+(selectedIds.has(b.id)?' selected':'')+'" data-id="'+b.id+'" data-action="visit" style="animation-delay:'+Math.min(i,10)*.03+'s">'+
      '<input type="checkbox" class="card-checkbox" data-id="'+b.id+'" data-action="check"'+(selectedIds.has(b.id)?' checked':'')+'>'+
      (b.favorite?'<div class="star-badge">⭐</div>':'')+
      (inactive?'<div class="inactive-badge">💤 未使用</div>':'')+
      '<div class="card-actions">'+
        '<div class="action-btn fav'+(b.favorite?' on':'')+'" data-id="'+b.id+'" data-action="fav" title="'+(b.favorite?'解除':'お気に入り')+'">⭐</div>'+
        '<div class="action-btn" data-id="'+b.id+'" data-action="edit" title="編集">✏️</div>'+
        '<div class="action-btn delete" data-id="'+b.id+'" data-action="delete" title="削除">🗑️</div>'+
      '</div>'+
      '<div class="card-header">'+
        '<div class="favicon" style="background:'+(b.color||'#2563eb')+'22">'+iconHTML+'</div>'+
        '<div class="card-meta">'+
          '<div class="card-title">'+esc(b.title)+'</div>'+
          '<div class="card-url">'+esc(getDomain(b.url))+'</div>'+
        '</div>'+
      '</div>'+
      '<div class="card-footer">'+
        '<div style="display:flex;gap:4px;flex-wrap:wrap">'+tags+'</div>'+
        '<div style="display:flex;align-items:center;gap:7px">'+
          '<div class="visit-count"><span class="visit-dot"></span>'+(b.visits||0)+'回</div>'+
          '<span class="card-arrow">→</span>'+
        '</div>'+
      '</div>'+
      '<div class="added-date">追加: '+fmtDate(b.addedAt)+(b.lastVisited?' · 最終: '+fmtDate(b.lastVisited):'')+'</div>'+
    '</div>';
  }).join('');

  if(bulkMode) updateBulkLabel();
}

// ── Card events (event delegation) ──
document.getElementById('grid').addEventListener('click',function(e){
  const btn=e.target.closest('[data-action]');
  if(!btn) return;
  const action=btn.dataset.action, id=btn.dataset.id;
  if(action==='check')  { e.stopPropagation(); toggleSelect(id); return; }
  if(action==='fav')    { e.stopPropagation(); toggleFav(id); return; }
  if(action==='edit')   { e.stopPropagation(); openEditModal(id); return; }
  if(action==='delete') { e.stopPropagation(); deleteBookmark(id); return; }
  if(action==='visit')  { bulkMode ? toggleSelect(id) : visitBookmark(id); }
});

function visitBookmark(id){
  const b=bookmarks.find(x=>x.id===id); if(!b) return;
  b.visits=(b.visits||0)+1; b.lastVisited=new Date().toISOString();
  save(); renderCards(); window.open(b.url,'_blank');
}
function toggleFav(id){
  const b=bookmarks.find(x=>x.id===id); if(!b) return;
  b.favorite=!b.favorite; save(); renderCards();
}
function deleteBookmark(id){
  if(!confirm('このブックマークを削除しますか？')) return;
  bookmarks=bookmarks.filter(b=>b.id!==id);
  save(); renderDropdown(); renderCards();
}

// ── Add/Edit Modal ──
function openModal(){
  editingId=null; selectedTags=[]; selectedIcon='🌐'; customImageData=null; currentFaviconUrl=null;
  document.getElementById('modalTitle').textContent='🔖 ブックマークを追加';
  ['urlInput','titleInput','newTagInput'].forEach(id=>document.getElementById(id).value='');
  ['urlStatus','dupWarning','photoStatus'].forEach(id=>document.getElementById(id).innerHTML='');
  document.getElementById('photoUpload').value='';
  const el=document.getElementById('previewIcon');
  el.textContent='🌐'; el.style.backgroundImage=''; el.style.backgroundSize=''; el.style.border='2px dashed var(--border)';
  renderIconPicker(); renderTagChips();
  document.getElementById('modal').style.display='flex';
  setTimeout(()=>document.getElementById('urlInput').focus(),100);
}
function openEditModal(id){
  const b=bookmarks.find(x=>x.id===id); if(!b) return;
  editingId=id; selectedTags=[...b.tags]; selectedIcon=b.icon||'🌐';
  customImageData=b.customImageData||null; currentFaviconUrl=b.faviconUrl||null;
  document.getElementById('modalTitle').textContent='✏️ ブックマークを編集';
  document.getElementById('urlInput').value=b.url;
  document.getElementById('titleInput').value=b.title;
  ['urlStatus','dupWarning','photoStatus'].forEach(id=>document.getElementById(id).innerHTML='');
  document.getElementById('photoUpload').value='';
  const el=document.getElementById('previewIcon');
  el.style.border='2px dashed var(--border)';
  if(b.customImageData){
    el.innerHTML=''; el.style.backgroundImage='url('+b.customImageData+')';
    el.style.backgroundSize='cover'; el.style.backgroundPosition='center';
  } else if(b.faviconUrl){
    el.style.backgroundImage=''; el.innerHTML='<img src="'+b.faviconUrl+'" alt="" style="width:24px;height:24px">';
  } else {
    el.style.backgroundImage=''; el.textContent=b.icon||getInitials(b.title);
  }
  renderIconPicker(); renderTagChips();
  document.getElementById('modal').style.display='flex';
}
function closeModal(){ document.getElementById('modal').style.display='none'; }

// Icon picker
function renderIconPicker(){
  document.getElementById('iconPicker').innerHTML=ICONS.map(ic=>
    '<div class="icon-opt'+(ic===selectedIcon&&!customImageData?' selected':'')+'" onclick="selectIcon(\''+ic+'\')">'+ic+'</div>'
  ).join('');
}
function selectIcon(icon){
  selectedIcon=icon; customImageData=null;
  const el=document.getElementById('previewIcon');
  el.style.backgroundImage=''; el.style.backgroundSize=''; el.style.border='2px dashed var(--border)';
  el.innerHTML=''; el.textContent=icon;
  document.getElementById('photoStatus').innerHTML='';
  renderIconPicker();
}

// Photo upload
function onPhotoUpload(e){
  const file=e.target.files[0]; if(!file) return;
  if(!file.type.startsWith('image/')){ alert('画像ファイルを選択してください'); return; }
  const reader=new FileReader();
  reader.onload=ev=>{
    customImageData=ev.target.result; selectedIcon=null;
    const el=document.getElementById('previewIcon');
    el.innerHTML=''; el.style.backgroundImage='url('+customImageData+')';
    el.style.backgroundSize='cover'; el.style.backgroundPosition='center';
    el.style.border='2px solid var(--accent)';
    document.getElementById('photoStatus').innerHTML=
      '<div style="font-size:12px;color:var(--green);margin-top:4px">✅ '+esc(file.name)+
      ' <span style="color:var(--red);cursor:pointer;margin-left:8px" onclick="clearPhoto()">× 削除</span></div>';
    renderIconPicker();
  };
  reader.readAsDataURL(file);
}
function clearPhoto(){
  customImageData=null; selectedIcon='🌐';
  document.getElementById('photoUpload').value='';
  document.getElementById('photoStatus').innerHTML='';
  const el=document.getElementById('previewIcon');
  el.style.backgroundImage=''; el.style.backgroundSize=''; el.style.border='2px dashed var(--border)'; el.textContent='🌐';
  renderIconPicker();
}

// Drag & drop on photo area
const dropArea=document.getElementById('dropArea');
dropArea.addEventListener('dragover',e=>{e.preventDefault();dropArea.classList.add('dragover')});
dropArea.addEventListener('dragleave',()=>dropArea.classList.remove('dragover'));
dropArea.addEventListener('drop',e=>{
  e.preventDefault(); dropArea.classList.remove('dragover');
  const file=e.dataTransfer.files[0];
  if(file){ const dt=new DataTransfer(); dt.items.add(file); document.getElementById('photoUpload').files=dt.files; onPhotoUpload({target:{files:dt.files}}); }
});

// Tag chips
function renderTagChips(){
  const all=getOrderedTags();
  document.getElementById('tagChips').innerHTML=all.map(tag=>
    '<div class="tag-chip'+(selectedTags.includes(tag)?' selected':'')+'" onclick="toggleTag(\''+esc(tag)+'\')">'+
    '<span class="tag-dot" style="background:'+getTagColor(tag)+'"></span>'+esc(tag)+'</div>'
  ).join('');
}
function toggleTag(tag){
  selectedTags=selectedTags.includes(tag)?selectedTags.filter(t=>t!==tag):[...selectedTags,tag];
  renderTagChips();
}
function addCustomTag(){
  const inp=document.getElementById('newTagInput');
  const tag=inp.value.trim(); if(!tag) return;
  if(!tagOrder.includes(tag)){
    const idx=tagOrder.indexOf('その他');
    if(idx!==-1) tagOrder.splice(idx,0,tag);
    else tagOrder.push(tag);
    if(!TAG_COLORS[tag]) assignUniqueColor(tag);
    saveTagOrder();
    renderDropdown();
  }
  if(!selectedTags.includes(tag)) selectedTags.push(tag);
  inp.value=''; renderTagChips();
}

// URL input
function onUrlInput(){
  clearTimeout(urlTimeout);
  const url=document.getElementById('urlInput').value.trim();
  document.getElementById('dupWarning').innerHTML='';
  if(!url||!url.startsWith('http')) return;
  const dup=bookmarks.find(b=>b.url===url&&b.id!==editingId);
  if(dup){
    document.getElementById('dupWarning').innerHTML=
      '<div class="dup-warning">⚠️ このURLはすでに「<strong>'+esc(dup.title)+'</strong>」として登録されています</div>';
  }
  urlTimeout=setTimeout(()=>fetchSiteInfo(url),800);
}
function fetchSiteInfo(url){
  const status=document.getElementById('urlStatus');
  status.innerHTML='<div class="url-loading"><span class="spinner"></span> サイト情報を取得中...</div>';
  const domain=getDomain(url);
  const fav=getFaviconUrl(url);
  currentFaviconUrl=fav;
  const el=document.getElementById('previewIcon');
  if(!customImageData){
    el.innerHTML='<img src="'+fav+'" onerror="this.parentElement.textContent=\'🌐\'" alt="" style="width:24px;height:24px">';
    el.style.backgroundImage='';
  }
  if(!document.getElementById('titleInput').value){
    const g=domain.split('.')[0];
    document.getElementById('titleInput').value=g.charAt(0).toUpperCase()+g.slice(1);
  }
  status.innerHTML='<div class="url-loading" style="color:var(--green)">✅ '+domain+'</div>';
}
function saveBookmark(){
  const url=document.getElementById('urlInput').value.trim();
  const title=document.getElementById('titleInput').value.trim()||getDomain(url);
  if(!url){ alert('URLを入力してください'); return; }
  if(!url.startsWith('http')){ alert('URLはhttp://またはhttps://で始めてください'); return; }
  const faviconUrl=customImageData?null:currentFaviconUrl;
  const tagList=selectedTags.length?selectedTags:['その他'];
  if(editingId){
    const b=bookmarks.find(x=>x.id===editingId);
    if(b){ b.url=url; b.title=title; b.icon=selectedIcon||'🌐'; b.tags=tagList; b.faviconUrl=faviconUrl; b.customImageData=customImageData||null; }
  } else {
    bookmarks.push({id:generateId(),url,title,icon:selectedIcon||'🌐',tags:tagList,faviconUrl,customImageData:customImageData||null,visits:0,favorite:false,addedAt:new Date().toISOString(),lastVisited:null,color:'hsl('+Math.floor(Math.random()*360)+',60%,50%)'});
  }
  save(); closeModal(); renderDropdown(); renderCards();
}

// ── Bulk edit ──
function toggleBulkMode(){
  bulkMode=!bulkMode; selectedIds.clear();
  document.getElementById('bulkBar').style.display=bulkMode?'flex':'none';
  document.getElementById('bulkToggleBtn').classList.toggle('active',bulkMode);
  document.getElementById('selectAllChk').checked=false;
  updateBulkLabel(); renderCards();
}
function toggleSelect(id){
  if(selectedIds.has(id)) selectedIds.delete(id); else selectedIds.add(id);
  const card=document.querySelector('.card[data-id="'+id+'"]');
  if(card){ card.classList.toggle('selected',selectedIds.has(id)); const chk=card.querySelector('.card-checkbox'); if(chk) chk.checked=selectedIds.has(id); }
  updateBulkLabel();
}
function toggleSelectAll(){
  const chk=document.getElementById('selectAllChk');
  const ids=[...document.querySelectorAll('.card[data-id]')].map(c=>c.dataset.id);
  if(chk.checked) ids.forEach(id=>selectedIds.add(id)); else ids.forEach(id=>selectedIds.delete(id));
  renderCards(); updateBulkLabel();
}
function updateBulkLabel(){
  document.getElementById('selectedCountLabel').textContent=selectedIds.size+'件選択中';
  const all=[...document.querySelectorAll('.card[data-id]')].map(c=>c.dataset.id);
  document.getElementById('selectAllChk').checked=all.length>0&&all.every(id=>selectedIds.has(id));
}
function bulkFavorite(val){
  if(!selectedIds.size) return;
  bookmarks.forEach(b=>{ if(selectedIds.has(b.id)) b.favorite=val; });
  save(); renderCards(); updateBulkLabel();
}
function bulkDelete(){
  if(!selectedIds.size) return;
  if(!confirm(selectedIds.size+'件のブックマークを削除しますか？')) return;
  bookmarks=bookmarks.filter(b=>!selectedIds.has(b.id));
  selectedIds.clear(); save(); renderDropdown(); renderCards(); updateBulkLabel();
}
function openBulkTagModal(){
  if(!selectedIds.size) return;
  document.getElementById('bulkTagTitle').textContent='🏷️ タグを一括変更 ('+selectedIds.size+'件)';
  const all=getOrderedTags();
  document.getElementById('bulkAddTags').innerHTML=all.map(t=>
    '<div class="tag-chip" data-tag="'+esc(t)+'" onclick="this.classList.toggle(\'selected\')">'+
    '<span class="tag-dot" style="background:'+getTagColor(t)+'"></span>'+esc(t)+'</div>'
  ).join('');
  document.getElementById('bulkRemoveTags').innerHTML=all.map(t=>
    '<div class="tag-chip" data-tag="'+esc(t)+'" onclick="this.classList.toggle(\'selected\');this.classList.toggle(\'danger-chip\',this.classList.contains(\'selected\'))">'+
    '<span class="tag-dot" style="background:'+getTagColor(t)+'"></span>'+esc(t)+'</div>'
  ).join('');
  document.getElementById('bulkTagModal').style.display='flex';
}
function applyBulkTags(){
  const add=[...document.querySelectorAll('#bulkAddTags .tag-chip.selected')].map(e=>e.dataset.tag);
  const remove=[...document.querySelectorAll('#bulkRemoveTags .tag-chip.selected')].map(e=>e.dataset.tag);
  bookmarks.forEach(b=>{
    if(!selectedIds.has(b.id)) return;
    add.forEach(t=>{ if(!b.tags.includes(t)) b.tags.push(t); });
    b.tags=b.tags.filter(t=>!remove.includes(t));
    if(!b.tags.length) b.tags=['その他'];
  });
  save(); document.getElementById('bulkTagModal').style.display='none';
  renderDropdown(); renderCards();
}

// ── Tag Manager ──
function openTagManager(){
  normalizeTagOrder();
  renderTagManagerList();
  document.getElementById('tagManagerModal').style.display='flex';
  document.getElementById('newGlobalTagInput').value='';
  setTimeout(()=>document.getElementById('newGlobalTagInput').focus(),150);
}
function closeTagManager(){
  document.getElementById('tagManagerModal').style.display='none';
  renderDropdown(); renderTagChips();
}
function applyAndCloseTagManager(){
  normalizeTagOrder(); saveTagOrder(); save();
  document.getElementById('tagManagerModal').style.display='none';
  renderDropdown(); renderCards(); renderTagChips();
}

function renderTagManagerList(){
  const list=document.getElementById('tagManagerList');
  const allUsed=[...new Set([...PRESET_TAGS,...bookmarks.flatMap(b=>b.tags)])];
  tmCurrentOrder=[
    ...tagOrder.filter(t=>t!=='その他'&&(allUsed.includes(t)||PRESET_TAGS.includes(t))),
    ...allUsed.filter(t=>t!=='その他'&&!tagOrder.includes(t)),
    'その他'
  ];
  list.innerHTML='';
  tmCurrentOrder.forEach((tag,i)=>{
    const count=bookmarks.filter(b=>b.tags.includes(tag)).length;
    const color=getTagColor(tag);
    const isSono=tag==='その他';
    const row=document.createElement('div');
    row.className='tag-manager-row'+(isSono?' sono-tag':'');
    row.draggable=!isSono;
    row.dataset.idx=i; row.dataset.tag=tag;

    const handle=document.createElement('span');
    handle.className='tag-drag-handle';
    handle.textContent='⠿';
    if(isSono){ handle.style.opacity='0.2'; handle.style.cursor='default'; }
    else handle.title='ドラッグして並び替え';

    const dot=document.createElement('span');
    dot.className='tag-manager-dot';
    dot.style.background=color;

    const input=document.createElement('input');
    input.className='tag-manager-name';
    input.value=tag;
    input.dataset.orig=tag;
    if(isSono){ input.readOnly=true; input.style.opacity='0.6'; input.style.cursor='default'; }
    input.addEventListener('blur',()=>renameTag(input));
    input.addEventListener('keydown',e=>{ if(e.key==='Enter') input.blur(); });

    const countBadge=document.createElement('span');
    countBadge.className='tag-manager-count';
    countBadge.textContent=count+'件';

    const delBtn=document.createElement('button');
    delBtn.className='tag-manager-delete';
    delBtn.textContent='✕';
    delBtn.title='削除';
    if(isSono){ delBtn.style.opacity='0.3'; delBtn.style.pointerEvents='none'; delBtn.disabled=true; }
    delBtn.addEventListener('click',()=>deleteTagFromManager(tag));

    row.append(handle,dot,input,countBadge,delBtn);

    if(!isSono){
      row.addEventListener('dragstart',e=>{
        dragSrcIdx=i; e.dataTransfer.effectAllowed='move';
        setTimeout(()=>row.style.opacity='0.4',0);
      });
      row.addEventListener('dragend',()=>{ row.style.opacity=''; });
      row.addEventListener('dragover',e=>{ e.preventDefault(); row.classList.add('drag-over'); });
      row.addEventListener('dragleave',()=>row.classList.remove('drag-over'));
      row.addEventListener('drop',e=>{
        e.preventDefault(); row.classList.remove('drag-over');
        if(dragSrcIdx===null||dragSrcIdx===i) return;
        const moved=tmCurrentOrder[dragSrcIdx];
        tmCurrentOrder.splice(dragSrcIdx,1);
        tmCurrentOrder.splice(i,0,moved);
        tagOrder=[...tmCurrentOrder.filter(t=>t!=='その他'),'その他'];
        dragSrcIdx=null;
        renderTagManagerList();
      });
    }
    list.appendChild(row);
  });
}

function renameTag(input){
  const oldTag=input.dataset.orig;
  const newTag=input.value.trim();
  if(!newTag||newTag===oldTag){ input.value=oldTag; return; }
  if(tagOrder.includes(newTag)&&newTag!==oldTag){ alert('「'+newTag+'」はすでに存在します'); input.value=oldTag; return; }
  bookmarks.forEach(b=>{ const idx=b.tags.indexOf(oldTag); if(idx!==-1) b.tags[idx]=newTag; });
  const oi=tagOrder.indexOf(oldTag);
  if(oi!==-1) tagOrder[oi]=newTag;
  if(TAG_COLORS[oldTag]&&!TAG_COLORS[newTag]) TAG_COLORS[newTag]=TAG_COLORS[oldTag];
  input.dataset.orig=newTag; input.value=newTag;
  renderTagManagerList();
}

function deleteTagFromManager(tag){
  if(tag==='その他') return;
  const count=bookmarks.filter(b=>b.tags.includes(tag)).length;
  const msg=count>0?'「'+tag+'」を削除しますか？\n'+count+'件のブックマークからこのタグが外れます。':'「'+tag+'」を削除しますか？';
  if(!confirm(msg)) return;
  bookmarks.forEach(b=>{ if(b.tags.includes(tag)){ b.tags=b.tags.filter(t=>t!==tag); if(!b.tags.length) b.tags=['その他']; } });
  tagOrder=tagOrder.filter(t=>t!==tag);
  delete TAG_COLORS[tag];
  renderTagManagerList(); renderDropdown();
}

function addGlobalTag(){
  const inp=document.getElementById('newGlobalTagInput');
  const tag=inp.value.trim();
  if(!tag) return;
  if(tagOrder.includes(tag)){ alert('「'+tag+'」はすでに存在します'); inp.select(); return; }
  const idx=tagOrder.indexOf('その他');
  if(idx!==-1) tagOrder.splice(idx,0,tag);
  else tagOrder.push(tag);
  assignUniqueColor(tag);
  inp.value=''; inp.focus();
  renderTagManagerList(); renderDropdown(); renderTagChips();
}

// ── Boot ──
loadTagOrder();
normalizeTagOrder();
if(localStorage.getItem('bm_dark')==='1'){
  document.body.classList.add('dark');
  document.getElementById('darkModeBtn').textContent='☀️';
}
renderDropdown(); renderCards();
</script>

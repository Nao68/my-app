<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Bookmark Sorter</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600;700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #eef2f7;
    --surface: #ffffff;
    --surface2: #f4f7fb;
    --border: #dde3ee;
    --text: #1a1f2e;
    --text-muted: #7a849a;
    --accent: #2563eb;
    --accent-light: #eff4ff;
    --gold: #f59e0b;
    --gold-light: #fffbeb;
    --red: #ef4444;
    --green: #10b981;
    --shadow: 0 2px 12px rgba(30,50,100,0.08);
    --shadow-lg: 0 8px 32px rgba(30,50,100,0.14);
    --radius: 16px;
    --radius-sm: 10px;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'DM Sans', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
  }

  .header {
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    padding: 14px 28px;
    display: flex;
    align-items: center;
    gap: 16px;
    position: sticky;
    top: 0;
    z-index: 100;
    box-shadow: var(--shadow);
    flex-wrap: wrap;
  }

  .logo { display: flex; align-items: center; gap: 10px; flex-shrink: 0; }
  .logo-icon {
    width: 36px; height: 36px;
    background: linear-gradient(135deg,#2563eb,#1d4ed8);
    border-radius: 10px;
    display: flex; align-items: center; justify-content: center;
    color: white; font-size: 18px;
  }
  .logo-text { font-size: 20px; font-weight: 700; }
  .logo-text span { color: var(--accent); }

  .header-controls { display: flex; align-items: center; gap: 10px; flex: 1; flex-wrap: wrap; }

  .dropdown-wrapper { position: relative; }
  .dropdown-btn {
    display: flex; align-items: center; gap: 8px;
    background: var(--surface2); border: 1px solid var(--border);
    border-radius: var(--radius-sm); padding: 8px 14px;
    font-family: inherit; font-size: 14px; font-weight: 500;
    color: var(--text); cursor: pointer; transition: all 0.2s; min-width: 150px;
  }
  .dropdown-btn:hover { border-color: var(--accent); background: var(--accent-light); }
  .dropdown-arrow { margin-left: auto; transition: transform 0.2s; font-size: 11px; color: var(--text-muted); }
  .dropdown-arrow.open { transform: rotate(180deg); }

  .dropdown-menu {
    position: absolute; top: calc(100% + 6px); left: 0;
    background: var(--surface); border: 1px solid var(--border);
    border-radius: var(--radius-sm); box-shadow: var(--shadow-lg);
    min-width: 200px; z-index: 200; overflow: hidden;
    animation: fadeDown 0.15s ease;
  }
  @keyframes fadeDown { from{opacity:0;transform:translateY(-6px)} to{opacity:1;transform:translateY(0)} }

  .dropdown-item {
    padding: 10px 16px; font-size: 14px; cursor: pointer;
    display: flex; align-items: center; justify-content: space-between;
    transition: background 0.15s;
  }
  .dropdown-item:hover { background: var(--surface2); }
  .dropdown-item.active { background: var(--accent-light); color: var(--accent); font-weight: 600; }
  .tag-count { background: var(--border); border-radius: 20px; padding: 2px 8px; font-size: 11px; font-weight: 600; color: var(--text-muted); }
  .active .tag-count { background: var(--accent); color: white; }

  .sort-select {
    background: var(--surface2); border: 1px solid var(--border);
    border-radius: var(--radius-sm); padding: 8px 12px;
    font-family: inherit; font-size: 14px; color: var(--text);
    cursor: pointer; outline: none; transition: all 0.2s;
  }
  .sort-select:focus, .sort-select:hover { border-color: var(--accent); }

  .search-box { flex: 1; max-width: 300px; position: relative; }
  .search-box input {
    width: 100%; background: var(--surface2); border: 1px solid var(--border);
    border-radius: var(--radius-sm); padding: 8px 14px 8px 36px;
    font-family: inherit; font-size: 14px; color: var(--text);
    transition: all 0.2s; outline: none;
  }
  .search-box input:focus { border-color: var(--accent); background: white; }
  .search-icon { position: absolute; left: 11px; top: 50%; transform: translateY(-50%); color: var(--text-muted); font-size: 15px; pointer-events: none; }

  /* Tabs */
  .tabs {
    display: flex; gap: 4px;
    padding: 12px 28px 0;
    border-bottom: 1px solid var(--border);
    background: var(--surface);
  }
  .tab {
    padding: 9px 18px; font-size: 14px; font-weight: 500;
    color: var(--text-muted); cursor: pointer; border-radius: 10px 10px 0 0;
    border: 1px solid transparent; border-bottom: none;
    transition: all 0.15s; background: transparent;
    display: flex; align-items: center; gap: 6px;
  }
  .tab:hover { color: var(--text); background: var(--surface2); }
  .tab.active {
    color: var(--accent); background: var(--bg);
    border-color: var(--border); font-weight: 600; position: relative;
  }
  .tab.active::after { content:''; position:absolute; bottom:-1px; left:0; right:0; height:1px; background:var(--bg); }
  .tab-badge { background: var(--border); color: var(--text-muted); border-radius: 20px; padding: 1px 7px; font-size: 11px; font-weight: 600; }
  .tab.active .tab-badge { background: var(--accent); color: white; }
  .badge-gold { background: var(--gold) !important; color: white !important; }
  .badge-red  { background: var(--red)  !important; color: white !important; }

  /* Main */
  .main { padding: 24px 28px; max-width: 1400px; margin: 0 auto; }
  .stats-bar { display: flex; align-items: center; gap: 12px; margin-bottom: 20px; font-size: 14px; color: var(--text-muted); }
  .stats-bar strong { color: var(--text); }

  .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 18px; }

  /* Card */
  .card {
    background: var(--surface); border-radius: var(--radius);
    border: 1px solid var(--border); padding: 18px;
    cursor: pointer; transition: all 0.2s; position: relative;
    box-shadow: var(--shadow); animation: cardIn 0.3s ease both;
  }
  @keyframes cardIn { from{opacity:0;transform:translateY(10px)} to{opacity:1;transform:translateY(0)} }
  .card:hover { box-shadow: var(--shadow-lg); transform: translateY(-2px); border-color: #c7d4f0; }
  .card.favorited { border-color: var(--gold); box-shadow: 0 2px 12px rgba(245,158,11,0.15); }

  .card-header { display: flex; align-items: center; gap: 12px; margin-bottom: 12px; }
  .favicon {
    width: 40px; height: 40px; border-radius: 10px;
    background: var(--surface2); border: 1px solid var(--border);
    display: flex; align-items: center; justify-content: center;
    font-size: 18px; font-weight: 700; flex-shrink: 0; overflow: hidden; color: white;
  }
  .favicon img { width: 24px; height: 24px; object-fit: contain; }
  .card-meta { flex: 1; min-width: 0; }
  .card-title { font-size: 15px; font-weight: 600; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .card-url   { font-size: 12px; color: var(--text-muted); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; font-family: 'DM Mono', monospace; }

  .card-tag { display: inline-flex; align-items: center; padding: 3px 10px; border-radius: 20px; font-size: 11px; font-weight: 600; letter-spacing: 0.05em; text-transform: uppercase; }

  .card-footer { display: flex; align-items: center; justify-content: space-between; margin-top: 12px; }
  .visit-count { font-size: 12px; color: var(--text-muted); display: flex; align-items: center; gap: 4px; }
  .visit-dot { width: 6px; height: 6px; border-radius: 50%; background: var(--green); display: inline-block; margin-right: 2px; }
  .card-arrow { color: var(--text-muted); font-size: 16px; transition: transform 0.2s, color 0.2s; }
  .card:hover .card-arrow { color: var(--accent); transform: translateX(3px); }

  .card-actions { position: absolute; top: 10px; right: 10px; display: none; gap: 5px; }
  .card:hover .card-actions { display: flex; }
  .action-btn {
    width: 28px; height: 28px; border-radius: 8px;
    border: 1px solid var(--border); background: var(--surface);
    color: var(--text-muted); display: flex; align-items: center; justify-content: center;
    cursor: pointer; font-size: 13px; transition: all 0.15s;
  }
  .action-btn:hover        { background: var(--accent); color: white; border-color: var(--accent); }
  .action-btn.delete:hover { background: var(--red);    color: white; border-color: var(--red); }
  .action-btn.fav.on       { background: var(--gold-light); border-color: var(--gold); color: var(--gold); }

  .star-badge    { position: absolute; top: 10px; left: 10px; font-size: 14px; pointer-events: none; }
  .inactive-badge {
    position: absolute; top: -6px; right: 44px;
    background: var(--red); color: white;
    font-size: 10px; font-weight: 700; padding: 2px 7px;
    border-radius: 20px; letter-spacing: 0.04em;
  }
  .added-date { font-size: 11px; color: var(--text-muted); margin-top: 6px; }

  /* FAB */
  .fab {
    position: fixed; bottom: 28px; right: 28px;
    width: 54px; height: 54px; border-radius: 18px;
    background: linear-gradient(135deg,#2563eb,#1d4ed8);
    color: white; border: none; font-size: 26px; cursor: pointer;
    box-shadow: 0 4px 20px rgba(37,99,235,0.4);
    display: flex; align-items: center; justify-content: center;
    transition: all 0.2s; z-index: 300;
  }
  .fab:hover { transform: scale(1.08) rotate(90deg); box-shadow: 0 8px 28px rgba(37,99,235,0.5); }

  /* Modal */
  .modal-overlay {
    position: fixed; inset: 0; background: rgba(10,20,50,0.4);
    backdrop-filter: blur(4px); z-index: 500;
    display: flex; align-items: center; justify-content: center;
    animation: fadeIn 0.2s ease;
  }
  @keyframes fadeIn { from{opacity:0} to{opacity:1} }
  .modal {
    background: var(--surface); border-radius: 20px; padding: 28px;
    width: 480px; max-width: 95vw; max-height: 90vh; overflow-y: auto;
    box-shadow: 0 24px 80px rgba(10,20,50,0.25); animation: slideUp 0.25s ease;
  }
  .modal::-webkit-scrollbar { width: 6px; }
  .modal::-webkit-scrollbar-track { background: transparent; }
  .modal::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
  @keyframes slideUp { from{opacity:0;transform:translateY(20px)} to{opacity:1;transform:translateY(0)} }

  .modal-title { font-size: 20px; font-weight: 700; margin-bottom: 22px; }
  .form-group  { margin-bottom: 16px; }
  .form-label  { display: block; font-size: 12px; font-weight: 600; color: var(--text-muted); margin-bottom: 6px; letter-spacing: 0.05em; text-transform: uppercase; }
  .form-input  {
    width: 100%; background: var(--surface2); border: 1px solid var(--border);
    border-radius: var(--radius-sm); padding: 10px 14px;
    font-family: inherit; font-size: 14px; color: var(--text); outline: none; transition: all 0.2s;
  }
  .form-input:focus { border-color: var(--accent); background: white; box-shadow: 0 0 0 3px rgba(37,99,235,0.1); }

  .icon-picker { display: flex; gap: 8px; flex-wrap: wrap; margin-top: 8px; }
  .icon-opt {
    width: 34px; height: 34px; border-radius: 8px;
    background: var(--surface2); border: 1px solid var(--border);
    display: flex; align-items: center; justify-content: center;
    cursor: pointer; font-size: 17px; transition: all 0.15s;
  }
  .icon-opt:hover, .icon-opt.selected { border-color: var(--accent); background: var(--accent-light); }

  .modal-actions { display: flex; gap: 10px; margin-top: 22px; justify-content: flex-end; }
  .btn { padding: 10px 20px; border-radius: var(--radius-sm); font-family: inherit; font-size: 14px; font-weight: 600; cursor: pointer; transition: all 0.15s; border: none; }
  .btn-ghost   { background: var(--surface2); color: var(--text-muted); border: 1px solid var(--border); }
  .btn-ghost:hover { background: var(--border); }
  .btn-primary { background: linear-gradient(135deg,#2563eb,#1d4ed8); color: white; box-shadow: 0 2px 10px rgba(37,99,235,0.3); }
  .btn-primary:hover { transform: translateY(-1px); box-shadow: 0 4px 16px rgba(37,99,235,0.4); }

  .url-loading { font-size: 12px; color: var(--accent); margin-top: 4px; display: flex; align-items: center; gap: 6px; }
  .spinner { width:12px; height:12px; border:2px solid var(--border); border-top-color:var(--accent); border-radius:50%; animation:spin 0.6s linear infinite; display:inline-block; }
  @keyframes spin { to{transform:rotate(360deg)} }

  .dup-warning { background:#fff7ed; border:1px solid #fed7aa; border-radius:8px; padding:10px 14px; font-size:13px; color:#c2410c; display:flex; align-items:center; gap:8px; margin-top:6px; }

  .tag-chips { display: flex; gap: 6px; flex-wrap: wrap; margin-top: 4px; }
  .tag-chip { padding: 4px 10px; border-radius: 20px; font-size: 12px; background: var(--surface2); border: 1px solid var(--border); cursor: pointer; font-weight: 500; transition: all 0.15s; }
  .tag-chip.selected { background: var(--accent); color: white; border-color: var(--accent); }
  .tag-chip:hover:not(.selected) { border-color: var(--accent); }
  .new-tag-input { display: flex; gap: 6px; margin-top: 8px; }

  .photo-drop-area {
    border: 2px dashed var(--border); border-radius: var(--radius-sm);
    padding: 16px; text-align: center; cursor: pointer; transition: all 0.2s; flex: 1;
  }
  .photo-drop-area:hover, .photo-drop-area.dragover { border-color: var(--accent); background: var(--accent-light); }

  .empty-state { text-align: center; padding: 80px 20px; color: var(--text-muted); grid-column: 1/-1; }
  .empty-icon  { font-size: 48px; margin-bottom: 12px; }
  .empty-title { font-size: 18px; font-weight: 600; color: var(--text); margin-bottom: 6px; }

  /* ── Bulk edit ── */
  .bulk-toggle-btn {
    display: flex; align-items: center; gap: 6px;
    padding: 8px 14px; border-radius: var(--radius-sm);
    font-family: inherit; font-size: 14px; font-weight: 600;
    cursor: pointer; border: 1px solid var(--border);
    background: var(--surface2); color: var(--text-muted);
    transition: all 0.2s; white-space: nowrap;
  }
  .bulk-toggle-btn:hover { border-color: var(--accent); color: var(--accent); background: var(--accent-light); }
  .bulk-toggle-btn.active { background: var(--accent); color: white; border-color: var(--accent); }

  .bulk-bar {
    background: #1e293b; color: white;
    padding: 12px 28px;
    display: flex; align-items: center; gap: 12px; flex-wrap: wrap;
    position: sticky; top: 64px; z-index: 90;
    box-shadow: 0 4px 16px rgba(0,0,0,0.2);
    animation: slideDown 0.2s ease;
  }
  @keyframes slideDown { from{opacity:0;transform:translateY(-8px)} to{opacity:1;transform:translateY(0)} }

  .bulk-info { display: flex; align-items: center; gap: 10px; min-width: 140px; }
  .bulk-actions { display: flex; align-items: center; gap: 8px; flex: 1; flex-wrap: wrap; }

  .bulk-btn {
    padding: 7px 14px; border-radius: 8px;
    font-family: inherit; font-size: 13px; font-weight: 600;
    cursor: pointer; border: 1px solid rgba(255,255,255,0.2);
    background: rgba(255,255,255,0.1); color: white;
    transition: all 0.15s; white-space: nowrap;
  }
  .bulk-btn:hover { background: rgba(255,255,255,0.2); border-color: rgba(255,255,255,0.4); }
  .bulk-btn.danger:hover { background: var(--red); border-color: var(--red); }

  .bulk-cancel {
    margin-left: auto; padding: 7px 14px; border-radius: 8px;
    font-family: inherit; font-size: 13px; font-weight: 600;
    cursor: pointer; border: 1px solid rgba(255,255,255,0.3);
    background: transparent; color: rgba(255,255,255,0.7);
    transition: all 0.15s;
  }
  .bulk-cancel:hover { background: rgba(255,255,255,0.1); color: white; }

  /* Card checkbox */
  .card-checkbox {
    position: absolute; top: 12px; left: 12px; z-index: 10;
    width: 20px; height: 20px; cursor: pointer;
    accent-color: var(--accent);
    display: none;
  }
  .bulk-mode .card-checkbox { display: block; }
  .bulk-mode .card { cursor: default; padding-left: 42px; }
  .bulk-mode .card.selected { border-color: var(--accent); background: var(--accent-light); box-shadow: 0 0 0 2px rgba(37,99,235,0.2); }
  .bulk-mode .card-actions { display: none !important; }
  .bulk-mode .star-badge { left: 38px; }

  /* Bulk tag modal */
  .danger-chip { background: #fee2e2 !important; border-color: var(--red) !important; color: var(--red) !important; }

  .bulk-tag-modal {
    background: var(--surface); border-radius: 20px; padding: 28px;
    width: 420px; max-width: 95vw;
    box-shadow: 0 24px 80px rgba(10,20,50,0.25);
    animation: slideUp 0.25s ease;
  }
</style>
</head>
<body>
<div id="app">

  <!-- Header -->
  <div class="header">
    <div class="logo">
      <div class="logo-icon">🔖</div>
      <div class="logo-text">Bookmark <span>Sorter</span></div>
    </div>
    <div class="header-controls">
      <!-- Tag filter dropdown -->
      <div class="dropdown-wrapper" id="dropdownWrapper">
        <button class="dropdown-btn" id="dropdownBtn" onclick="toggleDropdown()">
          <span>🏷️</span>
          <span id="selectedTagLabel">すべてのタグ</span>
          <span class="dropdown-arrow" id="dropdownArrow">▼</span>
        </button>
        <div class="dropdown-menu" id="dropdownMenu" style="display:none"></div>
      </div>
      <!-- Sort -->
      <select class="sort-select" id="sortSelect" onchange="renderCards()">
        <option value="visits">よく使う順</option>
        <option value="added">追加日順（新しい）</option>
        <option value="added_asc">追加日順（古い）</option>
        <option value="recent">最近使った順</option>
        <option value="alpha">タイトル A→Z</option>
        <option value="alpha_desc">タイトル Z→A</option>
        <option value="random">ランダム</option>
      </select>
      <!-- Search -->
      <div class="search-box">
        <span class="search-icon">🔍</span>
        <input type="text" placeholder="タイトル・URLで検索..." id="searchInput" oninput="renderCards()">
      </div>
      <!-- Bulk edit toggle -->
      <button class="bulk-toggle-btn" id="bulkToggleBtn" onclick="toggleBulkMode()" title="一括編集モード">
        ☑️ 一括編集
      </button>
    </div>
  </div>

  <!-- Tabs -->
  <div class="tabs">
    <div class="tab active" id="tab-all"      onclick="switchTab('all')">📚 すべて <span class="tab-badge" id="badge-all">0</span></div>
    <div class="tab"        id="tab-favorite" onclick="switchTab('favorite')">⭐ お気に入り <span class="tab-badge badge-gold" id="badge-fav">0</span></div>
    <div class="tab"        id="tab-inactive" onclick="switchTab('inactive')">💤 未使用(30日+) <span class="tab-badge badge-red" id="badge-inactive">0</span></div>
  </div>

  <!-- Bulk action bar -->
  <div class="bulk-bar" id="bulkBar" style="display:none">
    <div class="bulk-info">
      <label style="display:flex;align-items:center;gap:8px;cursor:pointer;font-weight:600;">
        <input type="checkbox" id="selectAllChk" onchange="toggleSelectAll()" style="width:16px;height:16px;cursor:pointer;">
        <span id="selectedCountLabel">0件選択中</span>
      </label>
    </div>
    <div class="bulk-actions">
      <button class="bulk-btn" onclick="bulkFavorite(true)"  title="お気に入りに追加">⭐ お気に入り追加</button>
      <button class="bulk-btn" onclick="bulkFavorite(false)" title="お気に入り解除">☆ お気に入り解除</button>
      <button class="bulk-btn" onclick="openBulkTagModal()"  title="タグを変更">🏷️ タグ変更</button>
      <button class="bulk-btn danger" onclick="bulkDelete()" title="削除">🗑️ 削除</button>
    </div>
    <button class="bulk-cancel" onclick="toggleBulkMode()">✕ 終了</button>
  </div>

  <!-- Main -->
  <div class="main">
    <div class="stats-bar"><strong id="visibleCount">0</strong> 件表示中</div>
    <div class="grid" id="grid"></div>
  </div>

  <button class="fab" onclick="openModal()" title="ブックマークを追加">＋</button>
</div>

<!-- Modal -->
<div class="modal-overlay" id="modal" style="display:none" onclick="closeModalOutside(event)">
  <div class="modal" onclick="event.stopPropagation()">
    <div class="modal-title" id="modalTitle">🔖 ブックマークを追加</div>

    <div class="form-group">
      <label class="form-label">URL</label>
      <input class="form-input" type="url" id="urlInput" placeholder="https://example.com" oninput="onUrlInput()">
      <div id="urlStatus"></div>
      <div id="dupWarning"></div>
    </div>

    <div class="form-group">
      <label class="form-label">アイコン</label>
      <div style="display:flex;align-items:center;gap:12px;margin-bottom:12px;">
        <div style="position:relative;cursor:pointer;" onclick="document.getElementById('photoUpload').click()">
          <div class="favicon" id="previewIcon" style="width:52px;height:52px;font-size:24px;border-radius:12px;border:2px dashed var(--border);">🌐</div>
          <div style="position:absolute;bottom:-4px;right:-4px;width:20px;height:20px;background:var(--accent);border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:11px;color:white;border:2px solid white;">📷</div>
        </div>
        <div class="photo-drop-area" id="dropArea" onclick="document.getElementById('photoUpload').click()">
          <div style="font-size:20px;margin-bottom:4px;">🖼️</div>
          <div style="font-size:13px;font-weight:500;">写真ライブラリから選択</div>
          <div style="font-size:11px;color:var(--text-muted);">クリックまたはドラッグ&ドロップ</div>
        </div>
        <input type="file" id="photoUpload" accept="image/*" style="display:none" onchange="onPhotoUpload(event)">
      </div>
      <div id="photoStatus"></div>
      <div style="font-size:12px;color:var(--text-muted);margin-bottom:6px;">または絵文字から選択：</div>
      <div class="icon-picker" id="iconPicker"></div>
    </div>

    <div class="form-group">
      <label class="form-label">タイトル</label>
      <input class="form-input" type="text" id="titleInput" placeholder="サイトのタイトル">
    </div>

    <div class="form-group">
      <label class="form-label">タグ</label>
      <div class="tag-chips" id="tagChips"></div>
      <div class="new-tag-input">
        <input class="form-input" type="text" id="newTagInput" placeholder="新しいタグを入力..." style="flex:1">
        <button class="btn btn-ghost" onclick="addCustomTag()">追加</button>
      </div>
    </div>

    <div class="modal-actions">
      <button class="btn btn-ghost" onclick="closeModal()">キャンセル</button>
      <button class="btn btn-primary" onclick="saveBookmark()">保存する</button>
    </div>
  </div>
</div>

<script>
const ICONS = ['🌐','📰','🎯','💡','🛠️','🎨','📊','🚀','🎵','📚','🔬','🏆','💬','🛒','🎮','📷','✉️','🗺️','🔐','🤖'];
const PRESET_TAGS = ['AI','DEVELOPMENT','DESIGN','PRODUCTIVITY','NEWS','SOCIAL','VIDEO','OTHER'];
const TAG_COLORS = {
  AI:'#2563eb', DEVELOPMENT:'#059669', DESIGN:'#db2777',
  PRODUCTIVITY:'#d97706', NEWS:'#16a34a', SOCIAL:'#7c3aed',
  VIDEO:'#dc2626', OTHER:'#6b7280'
};
const INACTIVE_DAYS = 30;

let bookmarks    = JSON.parse(localStorage.getItem('bm_v2') || '[]');
let editingId    = null;
let selectedTag  = null;
let selectedIcon = '🌐';
let selectedTags = [];
let customImageData = null;
let currentFaviconUrl = null;  // ← 自動取得したfaviconを確実に保持
let urlTimeout   = null;
let currentTab   = 'all';

function save() { localStorage.setItem('bm_v2', JSON.stringify(bookmarks)); }
function generateId() { return Date.now().toString(36) + Math.random().toString(36).slice(2); }
function getInitials(t) { return (t||'?').substring(0,2).toUpperCase(); }
function getDomain(url) { try { return new URL(url).hostname.replace('www.',''); } catch { return url; } }
function getFaviconUrl(url) { try { return `https://www.google.com/s2/favicons?domain=${new URL(url).hostname}&sz=32`; } catch { return null; } }
function getTagColor(tag) { return TAG_COLORS[tag] || '#6b7280'; }
function daysSince(ds) { if (!ds) return Infinity; return Math.floor((Date.now()-new Date(ds))/86400000); }
function fmtDate(ds) {
  if (!ds) return '';
  const d = new Date(ds);
  return `${d.getFullYear()}/${String(d.getMonth()+1).padStart(2,'0')}/${String(d.getDate()).padStart(2,'0')}`;
}
function escapeHtml(s) { return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }

// ── Dropdown ──
function toggleDropdown() {
  const m = document.getElementById('dropdownMenu');
  const a = document.getElementById('dropdownArrow');
  const open = m.style.display !== 'none';
  m.style.display = open ? 'none' : 'block';
  a.classList.toggle('open', !open);
}
document.addEventListener('click', e => {
  if (!document.getElementById('dropdownWrapper').contains(e.target)) {
    document.getElementById('dropdownMenu').style.display = 'none';
    document.getElementById('dropdownArrow').classList.remove('open');
  }
});
function renderDropdown() {
  const allTags = [...new Set(bookmarks.flatMap(b=>b.tags))];
  document.getElementById('dropdownMenu').innerHTML =
    `<div class="dropdown-item ${!selectedTag?'active':''}" onclick="filterByTag(null)">すべて <span class="tag-count">${bookmarks.length}</span></div>` +
    allTags.map(tag => {
      const n = bookmarks.filter(b=>b.tags.includes(tag)).length;
      return `<div class="dropdown-item ${selectedTag===tag?'active':''}" onclick="filterByTag('${tag}')">${tag} <span class="tag-count">${n}</span></div>`;
    }).join('');
}
function filterByTag(tag) {
  selectedTag = tag;
  document.getElementById('selectedTagLabel').textContent = tag || 'すべてのタグ';
  document.getElementById('dropdownMenu').style.display = 'none';
  document.getElementById('dropdownArrow').classList.remove('open');
  renderDropdown(); renderCards();
}

// ── Tabs ──
function switchTab(tab) {
  currentTab = tab;
  ['all','favorite','inactive'].forEach(t =>
    document.getElementById(`tab-${t}`).classList.toggle('active', t===tab)
  );
  renderCards();
}
function updateBadges() {
  document.getElementById('badge-all').textContent      = bookmarks.length;
  document.getElementById('badge-fav').textContent      = bookmarks.filter(b=>b.favorite).length;
  document.getElementById('badge-inactive').textContent = bookmarks.filter(b=>daysSince(b.lastVisited)>=INACTIVE_DAYS).length;
}

// ── Sort ──
function sortList(list) {
  const s = document.getElementById('sortSelect').value;
  const a = [...list];
  if (s==='visits')    return a.sort((x,y)=>(y.visits||0)-(x.visits||0));
  if (s==='added')     return a.sort((x,y)=>new Date(y.addedAt)-new Date(x.addedAt));
  if (s==='added_asc') return a.sort((x,y)=>new Date(x.addedAt)-new Date(y.addedAt));
  if (s==='recent')    return a.sort((x,y)=>new Date(y.lastVisited||0)-new Date(x.lastVisited||0));
  if (s==='alpha')     return a.sort((x,y)=>x.title.localeCompare(y.title,'ja'));
  if (s==='alpha_desc')return a.sort((x,y)=>y.title.localeCompare(x.title,'ja'));
  if (s==='random')    return a.sort(()=>Math.random()-0.5);
  return a;
}

// ── Render cards ──
function renderCards() {
  updateBadges();
  const q = document.getElementById('searchInput').value.toLowerCase();
  let list = [...bookmarks];

  if (currentTab==='favorite') list = list.filter(b=>b.favorite);
  if (currentTab==='inactive') list = list.filter(b=>daysSince(b.lastVisited)>=INACTIVE_DAYS);
  if (selectedTag) list = list.filter(b=>b.tags.includes(selectedTag));
  if (q) list = list.filter(b=>b.title.toLowerCase().includes(q)||b.url.toLowerCase().includes(q));
  list = sortList(list);

  document.getElementById('visibleCount').textContent = list.length;
  const grid = document.getElementById('grid');

  if (!list.length) {
    grid.innerHTML = `<div class="empty-state">
      <div class="empty-icon">${currentTab==='favorite'?'⭐':currentTab==='inactive'?'💤':'🔖'}</div>
      <div class="empty-title">${currentTab==='favorite'?'お気に入りがありません':currentTab==='inactive'?`${INACTIVE_DAYS}日以上未使用のブックマークはありません`:'ブックマークがありません'}</div>
      <div>${currentTab==='all'?'右下の「＋」ボタンから追加してください':''}</div>
    </div>`;
    return;
  }

  // bulkModeクラスをgridに維持
  if (bulkMode) grid.classList.add('bulk-mode');

  grid.innerHTML = list.map((b, i) => {
    const tags = b.tags.map(t=>`<span class="card-tag" style="background:${getTagColor(t)}22;color:${getTagColor(t)}">${t}</span>`).join('');
    const inactive = currentTab!=='inactive' && daysSince(b.lastVisited)>=INACTIVE_DAYS;
    const iconHTML = b.customImageData
      ? `<div style="width:100%;height:100%;background:url(${b.customImageData}) center/cover;border-radius:9px;"></div>`
      : b.faviconUrl
        ? `<img src="${b.faviconUrl}" onerror="this.parentElement.textContent='${b.icon||getInitials(b.title)}'" alt="">`
        : `<span style="color:${b.color||'#2563eb'}">${b.icon||getInitials(b.title)}</span>`;

    return `<div class="card${b.favorite?' favorited':''}" data-id="${b.id}" data-action="visit" style="animation-delay:${Math.min(i,10)*0.03}s">
      <input type="checkbox" class="card-checkbox" data-id="${b.id}" data-action="check" ${selectedIds.has(b.id)?'checked':''}>
      ${b.favorite?'<div class="star-badge">⭐</div>':''}
      ${inactive?'<div class="inactive-badge">💤 未使用</div>':''}
      <div class="card-actions">
        <div class="action-btn fav${b.favorite?' on':''}" data-id="${b.id}" data-action="fav" title="${b.favorite?'解除':'お気に入り'}">⭐</div>
        <div class="action-btn" data-id="${b.id}" data-action="edit" title="編集">✏️</div>
        <div class="action-btn delete" data-id="${b.id}" data-action="delete" title="削除">🗑️</div>
      </div>
      <div class="card-header">
        <div class="favicon" style="background:${b.color||'#2563eb'}22">${iconHTML}</div>
        <div class="card-meta">
          <div class="card-title">${escapeHtml(b.title)}</div>
          <div class="card-url">${escapeHtml(getDomain(b.url))}</div>
        </div>
      </div>
      <div class="card-footer">
        <div style="display:flex;gap:4px;flex-wrap:wrap;">${tags}</div>
        <div style="display:flex;align-items:center;gap:8px;">
          <div class="visit-count"><span class="visit-dot"></span>${b.visits||0}回</div>
          <span class="card-arrow">→</span>
        </div>
      </div>
      <div class="added-date">追加: ${fmtDate(b.addedAt)}${b.lastVisited?' · 最終: '+fmtDate(b.lastVisited):''}</div>
    </div>`;
  }).join('');

  // bulk選択状態を再適用
  if (bulkMode) {
    selectedIds.forEach(id => {
      const card = document.querySelector(`.card[data-id="${id}"]`);
      if (card) { card.classList.add('selected'); const chk = card.querySelector('.card-checkbox'); if(chk) chk.checked=true; }
    });
    updateBulkLabel();
  }
}

// イベント委譲でカード操作を一元管理（IDの特殊文字問題を回避）
document.getElementById('grid').addEventListener('click', function(e) {
  // action-btn
  const btn = e.target.closest('[data-action]');
  if (!btn) return;
  const action = btn.dataset.action;
  const id = btn.dataset.id;
  if (action === 'check')  { e.stopPropagation(); toggleSelect(id); return; }
  if (action === 'fav')    { e.stopPropagation(); toggleFav(id); return; }
  if (action === 'edit')   { e.stopPropagation(); openEditModal(id); return; }
  if (action === 'delete') { e.stopPropagation(); deleteBookmark(id); return; }
  if (action === 'visit')  { if (!bulkMode) visitBookmark(id); else { toggleSelect(id); } }
});

function visitBookmark(id) {
  const b = bookmarks.find(x=>x.id===id); if(!b) return;
  b.visits = (b.visits||0)+1;
  b.lastVisited = new Date().toISOString();
  save(); renderCards();
  window.open(b.url,'_blank');
}

function toggleFav(id) {
  const b = bookmarks.find(x=>x.id===id); if(!b) return;
  b.favorite = !b.favorite;
  save(); renderCards();
}

function deleteBookmark(id) {
  if(!confirm('このブックマークを削除しますか？')) return;
  bookmarks = bookmarks.filter(b=>b.id!==id);
  save(); renderDropdown(); renderCards();
}

// ── Modal ──
function openModal() {
  editingId=null; selectedTags=[]; selectedIcon='🌐'; customImageData=null; currentFaviconUrl=null;
  document.getElementById('modalTitle').textContent='🔖 ブックマークを追加';
  ['urlInput','titleInput','newTagInput'].forEach(id=>document.getElementById(id).value='');
  ['urlStatus','dupWarning','photoStatus'].forEach(id=>document.getElementById(id).innerHTML='');
  document.getElementById('photoUpload').value='';
  const el=document.getElementById('previewIcon');
  el.textContent='🌐'; el.style.backgroundImage=''; el.style.backgroundSize=''; el.style.border='2px dashed var(--border)';
  renderIconPicker(); renderTagChips();
  document.getElementById('modal').style.display='flex';
  setTimeout(()=>document.getElementById('urlInput').focus(),100);
}

function openEditModal(id) {
  const b=bookmarks.find(x=>x.id===id); if(!b) return;
  editingId=id; selectedTags=[...b.tags]; selectedIcon=b.icon||'🌐'; customImageData=b.customImageData||null; currentFaviconUrl=b.faviconUrl||null;
  document.getElementById('modalTitle').textContent='✏️ ブックマークを編集';
  document.getElementById('urlInput').value=b.url;
  document.getElementById('titleInput').value=b.title;
  ['urlStatus','dupWarning','photoStatus'].forEach(id=>document.getElementById(id).innerHTML='');
  document.getElementById('photoUpload').value='';
  const el=document.getElementById('previewIcon');
  el.style.border='2px dashed var(--border)';
  if(b.customImageData){
    el.innerHTML=''; el.style.backgroundImage=`url(${b.customImageData})`; el.style.backgroundSize='cover'; el.style.backgroundPosition='center';
  } else if(b.faviconUrl){
    el.style.backgroundImage=''; el.innerHTML=`<img src="${b.faviconUrl}" alt="" style="width:24px;height:24px">`;
    el.dataset.faviconUrl=b.faviconUrl;
  } else {
    el.style.backgroundImage=''; el.textContent=b.icon||getInitials(b.title);
  }
  renderIconPicker(); renderTagChips();
  document.getElementById('modal').style.display='flex';
}

function closeModal() { document.getElementById('modal').style.display='none'; }
function closeModalOutside(e) { if(e.target.id==='modal') closeModal(); }

// Icon picker
function renderIconPicker() {
  document.getElementById('iconPicker').innerHTML=ICONS.map(ic=>
    `<div class="icon-opt${ic===selectedIcon&&!customImageData?' selected':''}" onclick="selectIcon('${ic}')">${ic}</div>`
  ).join('');
}
function selectIcon(icon) {
  selectedIcon=icon; customImageData=null;
  // faviconUrlはクリアしない（URL入力で取得したものを保持）
  const el=document.getElementById('previewIcon');
  el.style.backgroundImage=''; el.style.backgroundSize=''; el.style.border='2px dashed var(--border)';
  el.innerHTML=''; el.textContent=icon;
  document.getElementById('photoStatus').innerHTML='';
  renderIconPicker();
}

function onPhotoUpload(e) {
  const file=e.target.files[0]; if(!file) return;
  if(!file.type.startsWith('image/')) { alert('画像ファイルを選択してください'); return; }
  const reader=new FileReader();
  reader.onload=ev=>{
    customImageData=ev.target.result; selectedIcon=null;
    const el=document.getElementById('previewIcon');
    el.innerHTML=''; el.style.backgroundImage=`url(${customImageData})`; el.style.backgroundSize='cover';
    el.style.backgroundPosition='center'; el.style.border='2px solid var(--accent)';
    document.getElementById('photoStatus').innerHTML=
      `<div style="font-size:12px;color:var(--green);margin-top:4px;">✅ ${escapeHtml(file.name)} <span style="color:var(--red);cursor:pointer;margin-left:8px;" onclick="clearPhoto()">× 削除</span></div>`;
    renderIconPicker();
  };
  reader.readAsDataURL(file);
}
function clearPhoto() {
  customImageData=null; selectedIcon='🌐';
  document.getElementById('photoUpload').value='';
  document.getElementById('photoStatus').innerHTML='';
  const el=document.getElementById('previewIcon');
  el.style.backgroundImage=''; el.style.backgroundSize=''; el.style.border='2px dashed var(--border)'; el.textContent='🌐';
  renderIconPicker();
}

// Drag & drop
const dropArea=document.getElementById('dropArea');
dropArea.addEventListener('dragover',e=>{e.preventDefault();dropArea.classList.add('dragover');});
dropArea.addEventListener('dragleave',()=>dropArea.classList.remove('dragover'));
dropArea.addEventListener('drop',e=>{
  e.preventDefault(); dropArea.classList.remove('dragover');
  const file=e.dataTransfer.files[0];
  if(file){const dt=new DataTransfer();dt.items.add(file);document.getElementById('photoUpload').files=dt.files;onPhotoUpload({target:{files:dt.files}});}
});

// Tag chips
function renderTagChips() {
  const all=[...new Set([...PRESET_TAGS,...bookmarks.flatMap(b=>b.tags)])];
  document.getElementById('tagChips').innerHTML=all.map(tag=>
    `<div class="tag-chip${selectedTags.includes(tag)?' selected':''}" onclick="toggleTag('${tag}')">${tag}</div>`
  ).join('');
}
function toggleTag(tag) {
  selectedTags=selectedTags.includes(tag)?selectedTags.filter(t=>t!==tag):[...selectedTags,tag];
  renderTagChips();
}
function addCustomTag() {
  const inp=document.getElementById('newTagInput');
  const tag=inp.value.trim().toUpperCase(); if(!tag) return;
  if(!selectedTags.includes(tag)) selectedTags.push(tag);
  inp.value=''; renderTagChips();
}

// URL input
function onUrlInput() {
  clearTimeout(urlTimeout);
  const url=document.getElementById('urlInput').value.trim();
  document.getElementById('dupWarning').innerHTML='';
  if(!url||!url.startsWith('http')) return;
  // Duplicate check
  const dup=bookmarks.find(b=>b.url===url&&b.id!==editingId);
  if(dup) {
    document.getElementById('dupWarning').innerHTML=
      `<div class="dup-warning">⚠️ このURLはすでに「<strong>${escapeHtml(dup.title)}</strong>」として登録されています</div>`;
  }
  urlTimeout=setTimeout(()=>fetchSiteInfo(url),800);
}

function fetchSiteInfo(url) {
  const status=document.getElementById('urlStatus');
  status.innerHTML='<div class="url-loading"><span class="spinner"></span> サイト情報を取得中...</div>';
  const domain=getDomain(url);
  const fav=getFaviconUrl(url);
  currentFaviconUrl=fav;  // ← グローバル変数に確実に保存
  const el=document.getElementById('previewIcon');
  if(!customImageData){
    el.innerHTML=`<img src="${fav}" onerror="this.parentElement.textContent='🌐'" alt="" style="width:24px;height:24px">`;
    el.style.backgroundImage='';
  }
  if(!document.getElementById('titleInput').value){
    const g=domain.split('.')[0];
    document.getElementById('titleInput').value=g.charAt(0).toUpperCase()+g.slice(1);
  }
  status.innerHTML=`<div class="url-loading" style="color:var(--green)">✅ ${domain}</div>`;
}

function saveBookmark() {
  const url=document.getElementById('urlInput').value.trim();
  const title=document.getElementById('titleInput').value.trim()||getDomain(url);
  if(!url){alert('URLを入力してください');return;}
  if(!url.startsWith('http')){alert('URLはhttp://またはhttps://で始めてください');return;}
  const el=document.getElementById('previewIcon');
  // 写真アップロードがある場合はfaviconなし、それ以外は自動取得faviconを使う
  const faviconUrl = customImageData ? null : currentFaviconUrl;
  const tagList=selectedTags.length?selectedTags:['OTHER'];

  if(editingId){
    const b=bookmarks.find(x=>x.id===editingId);
    if(b){b.url=url;b.title=title;b.icon=selectedIcon||'🌐';b.tags=tagList;b.faviconUrl=faviconUrl;b.customImageData=customImageData||null;}
  } else {
    bookmarks.push({
      id:generateId(), url, title,
      icon:selectedIcon||'🌐', tags:tagList, faviconUrl,
      customImageData:customImageData||null,
      visits:0, favorite:false,
      addedAt:new Date().toISOString(), lastVisited:null,
      color:`hsl(${Math.floor(Math.random()*360)},60%,50%)`
    });
  }
  save(); closeModal(); renderDropdown(); renderCards();
}


// ── Bulk edit ──
let bulkMode = false;
let selectedIds = new Set();

function toggleBulkMode() {
  bulkMode = !bulkMode;
  selectedIds.clear();
  document.getElementById('bulkBar').style.display = bulkMode ? 'flex' : 'none';
  document.getElementById('bulkToggleBtn').classList.toggle('active', bulkMode);
  document.getElementById('grid').classList.toggle('bulk-mode', bulkMode);
  document.getElementById('selectAllChk').checked = false;
  updateBulkLabel();
  renderCards();
}

function toggleSelect(id) {
  if (selectedIds.has(id)) selectedIds.delete(id);
  else selectedIds.add(id);
  // チェックボックスのUIを直接更新
  const chk = document.querySelector(`.card-checkbox[data-id="${id}"]`);
  if (chk) chk.checked = selectedIds.has(id);
  const card = document.querySelector(`.card[data-id="${id}"]`);
  if (card) card.classList.toggle('selected', selectedIds.has(id));
  updateBulkLabel();
}

function toggleSelectAll() {
  const chk = document.getElementById('selectAllChk');
  // 現在表示中のカードのIDを取得
  const visibleIds = [...document.querySelectorAll('.card[data-id]')].map(c=>c.dataset.id);
  if (chk.checked) visibleIds.forEach(id => selectedIds.add(id));
  else             visibleIds.forEach(id => selectedIds.delete(id));
  renderCards();
  updateBulkLabel();
}

function updateBulkLabel() {
  document.getElementById('selectedCountLabel').textContent = `${selectedIds.size}件選択中`;
  const allVisible = [...document.querySelectorAll('.card[data-id]')].map(c=>c.dataset.id);
  document.getElementById('selectAllChk').checked = allVisible.length > 0 && allVisible.every(id=>selectedIds.has(id));
}

function bulkFavorite(val) {
  if (!selectedIds.size) return;
  bookmarks.forEach(b => { if (selectedIds.has(b.id)) b.favorite = val; });
  save(); renderCards(); updateBulkLabel();
}

function bulkDelete() {
  if (!selectedIds.size) return;
  if (!confirm(`${selectedIds.size}件のブックマークを削除しますか？`)) return;
  bookmarks = bookmarks.filter(b => !selectedIds.has(b.id));
  selectedIds.clear();
  save(); renderDropdown(); renderCards(); updateBulkLabel();
}

// Bulk tag modal
let bulkTagModalEl = null;

function openBulkTagModal() {
  if (!selectedIds.size) return;
  // モーダルがなければ作成
  if (!bulkTagModalEl) {
    bulkTagModalEl = document.createElement('div');
    bulkTagModalEl.className = 'modal-overlay';
    bulkTagModalEl.id = 'bulkTagModal';
    bulkTagModalEl.onclick = e => { if(e.target===bulkTagModalEl) closeBulkTagModal(); };
    document.body.appendChild(bulkTagModalEl);
  }
  const allTags = [...new Set([...PRESET_TAGS, ...bookmarks.flatMap(b=>b.tags)])];
  bulkTagModalEl.innerHTML = `
    <div class="bulk-tag-modal" onclick="event.stopPropagation()">
      <div class="modal-title">🏷️ タグを一括変更 (${selectedIds.size}件)</div>
      <p style="font-size:13px;color:var(--text-muted);margin-bottom:16px;">選択した操作をすべての選択済みブックマークに適用します</p>
      <div class="form-group">
        <label class="form-label">追加するタグ</label>
        <div class="tag-chips" id="bulkAddTags">${allTags.map(t=>`<div class="tag-chip" data-tag="${t}" onclick="toggleBulkTag(this)">${t}</div>`).join('')}</div>
      </div>
      <div class="form-group" style="margin-top:16px">
        <label class="form-label">削除するタグ</label>
        <div class="tag-chips" id="bulkRemoveTags">${allTags.map(t=>`<div class="tag-chip" data-tag="${t}" onclick="toggleBulkRemoveTag(this)">${t}</div>`).join('')}</div>
      </div>
      <div class="modal-actions">
        <button class="btn btn-ghost" onclick="closeBulkTagModal()">キャンセル</button>
        <button class="btn btn-primary" onclick="applyBulkTags()">適用する</button>
      </div>
    </div>`;
  bulkTagModalEl.style.display = 'flex';
}

function closeBulkTagModal() { if(bulkTagModalEl) bulkTagModalEl.style.display = 'none'; }

function toggleBulkTag(el) { el.classList.toggle('selected'); }
function toggleBulkRemoveTag(el) { el.classList.toggle('selected'); el.classList.toggle('danger-chip', el.classList.contains('selected')); }

function applyBulkTags() {
  const addTags    = [...document.querySelectorAll('#bulkAddTags .tag-chip.selected')].map(e=>e.dataset.tag);
  const removeTags = [...document.querySelectorAll('#bulkRemoveTags .tag-chip.selected')].map(e=>e.dataset.tag);
  bookmarks.forEach(b => {
    if (!selectedIds.has(b.id)) return;
    addTags.forEach(t => { if (!b.tags.includes(t)) b.tags.push(t); });
    b.tags = b.tags.filter(t => !removeTags.includes(t));
    if (!b.tags.length) b.tags = ['OTHER'];
  });
  save(); closeBulkTagModal(); renderDropdown(); renderCards();
}

// Boot
renderDropdown(); renderCards();
</script>
</body>
